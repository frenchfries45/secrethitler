<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secret Hitler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ─── VARIABLES ─────────────────────────────────────────── */
    :root {
      --burg: #7A2030;
      --burg-light: #9B3040;
      --steel: #6B8FAD;
      --steel-light: #8AAEC8;
      --bronze: #B08D57;
      --bronze-light: #C9A87A;
      --ivory: #E8E0D4;
      --ivory-dim: rgba(232,224,212,0.55);
      --ivory-faint: rgba(232,224,212,0.25);
      --navy: #0E1628;
      --navy2: #141E34;
      --navy3: #1A2540;
      --panel: rgba(16,22,40,0.97);
      --panel-border: rgba(176,141,87,0.2);
      --green-pass: #4E9A6E;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--navy); color: var(--ivory);
      font-family: 'Crimson Text', serif; min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(122,32,48,0.08) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 15%, rgba(107,143,173,0.06) 0%, transparent 50%);
    }
    .app { min-height: 100vh; display: flex; flex-direction: column; }

    /* ─── HEADER ─────────────────────────────────────────────── */
    .header {
      text-align: center; padding: 22px 16px 14px;
      border-bottom: 1px solid var(--panel-border);
      background: linear-gradient(180deg, rgba(122,32,48,0.14) 0%, transparent 100%);
    }
    .header h1 {
      font-family: 'Cinzel', serif; font-size: clamp(1.8rem,5vw,3rem);
      font-weight: 900; color: var(--bronze-light); letter-spacing: .15em;
      text-shadow: 1px 2px 8px rgba(0,0,0,.6); text-transform: uppercase;
    }
    .header h1 span { color: var(--burg-light); }
    .header-sub { font-style: italic; color: var(--ivory-dim); font-size: .95rem; margin-top: 4px; letter-spacing: .08em; }

    /* ─── BUTTONS ────────────────────────────────────────────── */
    .btn {
      font-family: 'Cinzel', serif; font-size: .82rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; padding: 11px 26px;
      border: none; cursor: pointer; transition: all .18s; border-radius: 6px;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .35; cursor: not-allowed; transform: none; filter: none; }
    .btn-primary { background: linear-gradient(135deg, var(--burg), var(--burg-light)); color: var(--ivory); border: 1px solid rgba(176,141,87,.2); box-shadow: 0 4px 16px rgba(0,0,0,.4); }
    .btn-secondary { background: rgba(176,141,87,.12); color: var(--bronze-light); border: 1px solid rgba(176,141,87,.35); }
    .btn-ghost { background: rgba(232,224,212,.04); color: var(--ivory-dim); border: 1px solid rgba(232,224,212,.15); }
    .btn-liberal { background: linear-gradient(135deg,#4A7A9B,var(--steel-light)); color: white; border: 1px solid rgba(138,174,200,.25); box-shadow: 0 4px 14px rgba(0,0,0,.35); }
    .btn-fascist { background: linear-gradient(135deg, var(--burg), var(--burg-light)); color: var(--ivory); border: 1px solid rgba(176,141,87,.15); box-shadow: 0 4px 14px rgba(0,0,0,.35); }
    .btn-sm { padding: 7px 14px; font-size: .72rem; }
    .btn-lg { padding: 14px 38px; font-size: .95rem; }
    .btn-full { width: 100%; }

    /* ─── PANELS ─────────────────────────────────────────────── */
    .panel {
      background: var(--panel); border: 1px solid var(--panel-border);
      border-radius: 10px; box-shadow: 0 4px 24px rgba(0,0,0,.5); padding: 20px;
    }
    .panel-title {
      font-family: 'Cinzel', serif; font-size: .88rem; font-weight: 700;
      color: var(--bronze-light); letter-spacing: .15em; text-transform: uppercase;
      margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--panel-border);
    }

    /* ─── INPUTS ─────────────────────────────────────────────── */
    .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .input-label { font-family: 'Cinzel', serif; font-size: .67rem; letter-spacing: .15em; color: var(--bronze); text-transform: uppercase; }
    .input {
      background: rgba(14,22,40,.7); border: 1px solid rgba(176,141,87,.25);
      color: var(--ivory); font-family: 'Crimson Text', serif; font-size: 1.1rem;
      padding: 10px 14px; width: 100%; outline: none; transition: border-color .2s; border-radius: 6px;
    }
    .input:focus { border-color: var(--bronze); }
    .input::placeholder { color: var(--ivory-faint); }
    .input-code { text-transform: uppercase; letter-spacing: .2em; font-family: 'Cinzel', serif; }

    /* ─── LOBBY ──────────────────────────────────────────────── */
    .lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; padding: 24px 16px; gap: 32px; }
    .lobby-hero { text-align: center; max-width: 500px; }
    .lobby-hero p { color: var(--ivory-dim); font-style: italic; font-size: 1.1rem; line-height: 1.6; margin-top: 12px; }
    .lobby-cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 600px; width: 100%; }
    .lobby-card { flex: 1; min-width: 220px; max-width: 260px; }
    .lobby-footer { text-align: center; color: var(--ivory-faint); font-style: italic; font-size: .85rem; }

    /* ─── WAITING ROOM ───────────────────────────────────────── */
    .waiting-room { max-width: 640px; margin: 40px auto; padding: 24px 16px; }
    .room-code-label { font-family: 'Cinzel', serif; font-size: .65rem; letter-spacing: .25em; color: var(--ivory-faint); text-transform: uppercase; margin-bottom: 8px; text-align: center; }
    .room-code-big { font-family: 'Cinzel', serif; font-size: 3rem; font-weight: 900; color: var(--bronze-light); letter-spacing: .35em; text-shadow: 1px 2px 10px rgba(0,0,0,.5); text-align: center; }
    .room-code-sub { text-align: center; color: var(--ivory-faint); font-style: italic; font-size: .88rem; margin: 8px 0 14px; }
    .invite-row { display: flex; justify-content: center; margin-bottom: 16px; }
    .invite-copy-btn {
      font-family: 'Cinzel', serif; font-size: .68rem; letter-spacing: .08em;
      text-transform: uppercase; padding: 9px 22px; border-radius: 6px;
      border: 1px solid rgba(176,141,87,.35); background: rgba(176,141,87,.1);
      color: var(--bronze-light); cursor: pointer; transition: all .18s;
    }
    .invite-copy-btn:hover { background: rgba(176,141,87,.2); border-color: var(--bronze); }
    .invite-copy-btn.copied { color: var(--green-pass); border-color: rgba(78,154,110,.5); background: rgba(78,154,110,.08); }
    .player-list { display: flex; flex-direction: column; gap: 8px; margin: 12px 0; }
    .player-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 14px;
      background: rgba(255,255,255,.03); border: 1px solid var(--panel-border);
      border-left: 3px solid var(--bronze); border-radius: 6px;
    }
    .player-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif; font-weight: 700; font-size: .85rem;
      background: linear-gradient(135deg, var(--navy3), var(--navy2));
      color: var(--bronze-light); border: 1px solid rgba(176,141,87,.3);
    }
    .player-name { font-size: 1.05rem; color: var(--ivory); flex: 1; }
    .player-host-badge {
      font-family: 'Cinzel', serif; font-size: .58rem; letter-spacing: .1em;
      color: var(--bronze); border: 1px solid rgba(176,141,87,.35);
      padding: 2px 8px; border-radius: 4px; background: rgba(176,141,87,.08);
    }
    .host-actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
    .waiting-footer { text-align: center; color: var(--ivory-faint); font-style: italic; margin-top: 16px; font-size: .9rem; }
    .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--panel-border), transparent); margin: 14px 0; }

    /* ─── NIGHT PHASE ────────────────────────────────────────── */
    .night-phase { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; padding: 24px; text-align: center; gap: 24px; }
    .night-label { font-family: 'Cinzel', serif; font-size: .8rem; letter-spacing: .2em; color: rgba(232,224,212,.4); text-transform: uppercase; }
    .role-card {
      width: 220px; height: 320px; border: 2px solid; border-radius: 14px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; cursor: pointer; transition: all .3s;
    }
    .role-card.liberal { border-color: var(--steel); background: linear-gradient(160deg, rgba(107,143,173,.2), rgba(14,22,40,.95)); box-shadow: 0 8px 32px rgba(0,0,0,.5); }
    .role-card.fascist { border-color: var(--burg); background: linear-gradient(160deg, rgba(122,32,48,.2), rgba(14,22,40,.95)); box-shadow: 0 8px 32px rgba(0,0,0,.5); }
    .role-card.hitler { border-color: var(--bronze); background: linear-gradient(160deg, rgba(122,32,48,.25), rgba(14,22,40,.97)); box-shadow: 0 8px 32px rgba(0,0,0,.6); }
    .role-icon { font-size: 4rem; }
    .role-name { font-family: 'Cinzel', serif; font-size: 1.4rem; font-weight: 900; letter-spacing: .16em; text-transform: uppercase; }
    .role-card.liberal .role-name { color: var(--steel-light); }
    .role-card.fascist .role-name { color: var(--burg-light); }
    .role-card.hitler .role-name { color: var(--bronze-light); }
    .role-desc { font-style: italic; color: var(--ivory-dim); font-size: .9rem; padding: 0 16px; }
    .fascist-knowledge { background: rgba(122,32,48,.12); border: 1px solid rgba(122,32,48,.4); padding: 16px 24px; max-width: 400px; width: 100%; border-radius: 8px; }
    .fascist-knowledge h3 { font-family: 'Cinzel', serif; color: var(--burg-light); font-size: .82rem; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px; }
    .fascist-knowledge p { color: var(--ivory); font-size: 1rem; margin-bottom: 4px; }
    .night-hint { color: rgba(232,224,212,.4); font-style: italic; font-size: .9rem; max-width: 360px; }

    /* ─── STATUS BAR ─────────────────────────────────────────── */
    .status-bar {
      display: flex; align-items: center; gap: 16px; padding: 9px 16px;
      background: rgba(14,22,40,.6); border-bottom: 1px solid var(--panel-border);
      flex-wrap: wrap; font-size: .85rem;
    }
    .status-item { display: flex; align-items: center; gap: 6px; color: var(--ivory-dim); }
    .status-label { font-family: 'Cinzel', serif; font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: var(--ivory-faint); }
    .status-value { font-weight: 700; color: var(--bronze-light); }
    .exit-btn {
      font-family: 'Cinzel', serif; font-size: .6rem; letter-spacing: .1em;
      text-transform: uppercase; padding: 6px 14px; border: 1px solid rgba(232,224,212,.12);
      background: transparent; color: var(--ivory-faint); cursor: pointer; transition: all .2s;
      margin-left: auto; flex-shrink: 0; border-radius: 5px;
    }
    .exit-btn:hover { border-color: var(--burg-light); color: var(--burg-light); }

    /* ─── GAMEBOARD ──────────────────────────────────────────── */
    .gameboard { max-width: 1100px; margin: 0 auto; padding: 16px; display: grid; grid-template-columns: 300px 1fr; gap: 16px; align-items: start; }
    .gameboard-left { display: flex; flex-direction: column; gap: 12px; }
    .gameboard-right { display: flex; flex-direction: column; gap: 12px; }
    @media(max-width:700px) { .gameboard { grid-template-columns: 1fr; } }

    /* ─── LEFT PANEL ─────────────────────────────────────────── */
    .left-panel { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 10px; box-shadow: 0 4px 24px rgba(0,0,0,.5); padding: 16px; }

    /* ─── TABS ───────────────────────────────────────────────── */
    .panel-tabs { display: flex; border-bottom: 1px solid var(--panel-border); margin-bottom: 14px; }
    .panel-tab {
      font-family: 'Cinzel', serif; font-size: .66rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; padding: 8px 15px; cursor: pointer; color: var(--ivory-faint);
      border-bottom: 2px solid transparent; transition: all .18s; background: none;
      border-top: none; border-left: none; border-right: none; position: relative; top: 1px;
    }
    .panel-tab:hover { color: var(--ivory-dim); }
    .panel-tab.active { color: var(--bronze-light); border-bottom-color: var(--bronze); }
    .tab-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--burg-light); margin-left: 6px; vertical-align: middle; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ─── POLICY TRACKS ──────────────────────────────────────── */
    .policy-tracks { display: flex; flex-direction: column; gap: 12px; }
    .policy-track { padding: 16px; border-radius: 8px; }
    .liberal-track { background: rgba(107,143,173,.1); border: 1px solid rgba(107,143,173,.3); }
    .fascist-track { background: rgba(122,32,48,.12); border: 1px solid rgba(122,32,48,.35); }
    .track-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .track-label { font-family: 'Cinzel', serif; font-size: .7rem; letter-spacing: .15em; text-transform: uppercase; font-weight: 700; }
    .track-label.liberal { color: var(--steel-light); }
    .track-label.fascist { color: var(--burg-light); }
    .track-count { font-family: 'Cinzel', serif; font-size: 1.4rem; font-weight: 900; }
    .track-count.liberal { color: var(--steel-light); }
    .track-count.fascist { color: var(--burg-light); }
    .policy-slots { display: flex; gap: 6px; }
    .policy-slot { flex: 1; height: 44px; border: 1px solid; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: all .3s; position: relative; border-radius: 4px; }
    .liberal-slot { border-color: rgba(107,143,173,.22); background: rgba(107,143,173,.05); }
    .liberal-slot.filled { background: linear-gradient(135deg,#4A7A9B,var(--steel-light)); border-color: var(--steel); box-shadow: 0 2px 10px rgba(0,0,0,.35); }
    .fascist-slot { border-color: rgba(122,32,48,.2); background: rgba(122,32,48,.04); }
    .fascist-slot.filled { background: linear-gradient(135deg, var(--burg), var(--burg-light)); border-color: var(--burg-light); box-shadow: 0 2px 10px rgba(0,0,0,.35); }
    .action-badge { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); font-family: 'Cinzel', serif; font-size: .44rem; letter-spacing: .05em; color: var(--ivory-faint); white-space: nowrap; text-transform: uppercase; }

    /* ─── ELECTION TRACKER ───────────────────────────────────── */
    .election-tracker { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: rgba(176,141,87,.07); border: 1px solid rgba(176,141,87,.22); border-radius: 8px; margin-top: 12px; }
    .tracker-label { font-family: 'Cinzel', serif; font-size: .66rem; letter-spacing: .1em; text-transform: uppercase; color: var(--ivory-dim); flex-shrink: 0; }
    .tracker-dots { display: flex; gap: 8px; flex: 1; }
    .tracker-dot { width: 20px; height: 20px; border-radius: 50%; border: 1px solid rgba(176,141,87,.28); background: rgba(176,141,87,.05); transition: all .3s; }
    .tracker-dot.active { background: linear-gradient(135deg,#C8860A,#E5A020); border-color: #C8860A; box-shadow: 0 2px 8px rgba(0,0,0,.4); }
    .chaos-warning { font-size: .72rem; color: var(--bronze-light); font-family: 'Cinzel', serif; letter-spacing: .05em; }

    /* ─── ACTION TAB ─────────────────────────────────────────── */
    .vote-tab-content { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 10px 0 4px; text-align: center; }
    .vote-gov-header { font-family: 'Cinzel', serif; font-size: .62rem; letter-spacing: .14em; text-transform: uppercase; color: var(--ivory-faint); margin-bottom: 2px; }
    .vote-gov-names { font-size: 1.04rem; color: var(--ivory); margin-bottom: 4px; line-height: 1.5; }
    .vote-gov-roles { font-size: .72rem; color: rgba(232,224,212,.3); font-family: 'Cinzel', serif; letter-spacing: .08em; }
    .vote-status-row { display: flex; align-items: center; gap: 8px; font-size: .82rem; color: var(--ivory-dim); font-style: italic; }
    .vote-confirm { font-family: 'Cinzel', serif; font-size: .78rem; letter-spacing: .08em; padding: 8px 18px; border: 1px solid; border-radius: 6px; }
    .vote-confirm.ja { color: var(--green-pass); border-color: rgba(78,154,110,.4); background: rgba(78,154,110,.08); }
    .vote-confirm.nein { color: var(--burg-light); border-color: rgba(122,32,48,.5); background: rgba(122,32,48,.08); }
    .vote-buttons { display: flex; gap: 10px; flex-direction: column; width: 100%; }
    .vote-result-breakdown { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 6px; }
    .vr-chip { font-size: .76rem; padding: 3px 10px; border: 1px solid; border-radius: 5px; display: flex; align-items: center; gap: 4px; }
    .vr-chip.ja { color: var(--green-pass); border-color: rgba(78,154,110,.35); }
    .vr-chip.nein { color: var(--burg-light); border-color: rgba(122,32,48,.4); }
    .phase-title { font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 700; color: var(--bronze-light); letter-spacing: .12em; text-transform: uppercase; }
    .phase-sub { color: var(--ivory-dim); font-style: italic; font-size: .9rem; max-width: 400px; }
    .action-idle { color: rgba(232,224,212,.3); font-style: italic; font-size: .88rem; padding: 20px 0; }

    /* ─── POLICY CARDS ───────────────────────────────────────── */
    .policy-cards-area { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%; }
    .policy-card {
      width: 100%; height: 56px; border: 2px solid; border-radius: 8px;
      display: flex; align-items: center; gap: 14px; padding: 0 16px;
      cursor: pointer; transition: all .2s;
    }
    .policy-card.liberal-policy { border-color: var(--steel); color: var(--steel-light); background: linear-gradient(160deg, rgba(107,143,173,.18), rgba(14,22,40,.9)); }
    .policy-card.fascist-policy { border-color: var(--burg-light); color: var(--burg-light); background: linear-gradient(160deg, rgba(122,32,48,.2), rgba(14,22,40,.9)); }
    .policy-card:hover { transform: translateX(4px); box-shadow: 0 4px 18px rgba(0,0,0,.5); }
    .policy-card-icon { font-size: 1.4rem; }
    .policy-card-type { font-family: 'Cinzel', serif; font-size: .68rem; letter-spacing: .1em; text-transform: uppercase; font-weight: 700; }
    .peek-cards { display: flex; gap: 10px; justify-content: center; margin: 12px 0; }
    .peek-card { width: 58px; height: 84px; border: 1px solid; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border-radius: 6px; }
    .peek-card.liberal { border-color: var(--steel); background: rgba(107,143,173,.18); }
    .peek-card.fascist { border-color: var(--burg-light); background: rgba(122,32,48,.18); }

    /* ─── VETO ───────────────────────────────────────────────── */
    .veto-area { background: rgba(176,141,87,.07); border: 1px solid rgba(176,141,87,.3); padding: 14px 20px; text-align: center; border-radius: 8px; width: 100%; }
    .veto-title { font-family: 'Cinzel', serif; font-size: .76rem; letter-spacing: .1em; color: var(--bronze-light); text-transform: uppercase; margin-bottom: 8px; }
    .veto-sub { font-size: .82rem; color: rgba(232,224,212,.6); margin-bottom: 8px; }

    /* ─── PLAYER GRID ────────────────────────────────────────── */
    .nomination-prompt { background: rgba(176,141,87,.07); border: 1px solid rgba(176,141,87,.2); border-left: 3px solid var(--bronze); padding: 10px 14px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; border-radius: 0 6px 6px 0; }
    .nomination-prompt-icon { font-size: 1.1rem; }
    .nomination-prompt-text { font-size: .86rem; color: var(--ivory-dim); font-style: italic; flex: 1; }
    .nomination-prompt-text strong { color: var(--bronze-light); font-style: normal; }
    .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 8px; }
    .player-card {
      padding: 12px; border: 1px solid rgba(176,141,87,.12); background: rgba(255,255,255,.02);
      text-align: center; cursor: default; transition: all .2s; position: relative; border-radius: 8px;
    }
    .player-card.selectable { cursor: pointer; border-color: rgba(176,141,87,.3); }
    .player-card.selectable:hover { border-color: var(--bronze); background: rgba(176,141,87,.07); transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.35); }
    .player-card.is-president { border-color: var(--bronze); background: rgba(176,141,87,.09); }
    .player-card.is-chancellor { border-color: var(--steel); background: rgba(107,143,173,.1); }
    .player-card.is-dead { opacity: .3; }
    .player-card.is-me { border-left: 3px solid var(--bronze); }
    .player-card.not-eligible { opacity: .35; cursor: not-allowed; }
    .player-card-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--navy3), var(--navy2)); border: 1px solid rgba(176,141,87,.28); display: flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-weight: 700; font-size: .95rem; color: var(--bronze-light); margin: 0 auto 8px; }
    .player-card-name { font-size: .84rem; color: var(--ivory); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIGURATION — Replace with your actual Supabase credentials
// ═══════════════════════════════════════════════════════════════
const SUPABASE_URL  = 'https://luxolhuznjrtyzpunzzv.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1eG9saHV6bmpydHl6cHVuenp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MzUzMzEsImV4cCI6MjA4ODIxMTMzMX0.dGnju47SAXguEdN8j73W4h4OHVg-YnPJEMIlqUv8RUc';

// ═══════════════════════════════════════════════════════════════
// SUPABASE CLIENT
// ═══════════════════════════════════════════════════════════════
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

// ═══════════════════════════════════════════════════════════════
// GAME CONSTANTS
// ═══════════════════════════════════════════════════════════════
const ROLE_DISTRIBUTION = {
  5:  { liberals:3, fascists:1, hitler:1 },
  6:  { liberals:4, fascists:1, hitler:1 },
  7:  { liberals:4, fascists:2, hitler:1 },
  8:  { liberals:5, fascists:2, hitler:1 },
  9:  { liberals:5, fascists:3, hitler:1 },
  10: { liberals:6, fascists:3, hitler:1 },
};
const EXECUTIVE_ACTIONS = {
  '5-6':  [null,null,'peek','kill','kill'],
  '7-8':  [null,null,'investigate','special_elect','kill','kill'],
  '9-10': [null,'investigate','investigate','special_elect','kill','kill'],
};
const INITIAL_DECK = [...Array(11).fill('fascist'), ...Array(6).fill('liberal')];

// ═══════════════════════════════════════════════════════════════
// PURE GAME LOGIC HELPERS
// ═══════════════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function generateCode() {
  return Math.random().toString(36).substring(2,7).toUpperCase();
}

function assignRoles(playerIds) {
  const dist = ROLE_DISTRIBUTION[playerIds.length];
  const roles = [...Array(dist.liberals).fill('liberal'), ...Array(dist.fascists).fill('fascist'), 'hitler'];
  const shuffled = shuffle(roles);
  const out = {};
  playerIds.forEach((id,i) => { out[id] = shuffled[i]; });
  return out;
}

function getExecAction(fascistCount, playerCount) {
  const bracket = playerCount<=6 ? '5-6' : playerCount<=8 ? '7-8' : '9-10';
  return (EXECUTIVE_ACTIONS[bracket][fascistCount-1]) || null;
}

function checkWin(gs) {
  if (gs.liberal_policies >= 5) return { winner:'liberal', reason:'5 Liberal policies enacted!' };
  if (gs.fascist_policies >= 6) return { winner:'fascist', reason:'6 Fascist policies enacted!' };
  if (gs.hitler_killed)         return { winner:'liberal', reason:'Hitler was assassinated!' };
  if (gs.hitler_elected)        return { winner:'fascist', reason:'Hitler was elected Chancellor!' };
  return null;
}

function nextPresId(currentId, players) {
  const alive = players.filter(p => p.alive);
  const idx = alive.findIndex(p => p.id === currentId);
  return alive[(idx+1) % alive.length]?.id;
}

// ═══════════════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════════════
let APP = {
  screen: 'lobby',            // lobby | loading | waiting | night | game | win
  myId: Math.random().toString(36).substr(2,9),
  myName: '',
  joinCodeInput: '',
  roomCode: null,
  hostId: null,
  isHost: false,
  players: [],
  roles: {},
  fascistKnowledge: [],
  gameState: null,
  winState: null,
  nightRevealed: false,
  roleVisible: false,
  // UI tabs
  leftTab: 'board',
  rightTab: 'players',
  identityOpen: false,
  exitConfirm: false,
  linkCopied: false,
  // subscription handle
  _channel: null,
  _notifTimer: null,
};

// ═══════════════════════════════════════════════════════════════
// RENDER ENGINE — tiny virtual-DOM-free renderer
// ═══════════════════════════════════════════════════════════════
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k === 'class') { el.className = v; }
    else if (k === 'style' && typeof v === 'object') { Object.assign(el.style, v); }
    else if (k.startsWith('on')) { el.addEventListener(k.slice(2).toLowerCase(), v); }
    else if (k === 'disabled') { if(v) el.disabled = true; }
    else { el.setAttribute(k, v); }
  }
  for (const child of children.flat(Infinity)) {
    if (child == null || child === false) continue;
    el.appendChild(typeof child === 'string' || typeof child === 'number'
      ? document.createTextNode(child) : child);
  }
  return el;
}

function render() {
  const root = document.getElementById('app');
  const newTree = buildApp();
  root.innerHTML = '';
  root.appendChild(newTree);
}

// ═══════════════════════════════════════════════════════════════
// NOTIFICATION
// ═══════════════════════════════════════════════════════════════
function notify(msg, duration=3500) {
  const existing = document.querySelector('.notification');
  if (existing) existing.remove();
  const el = h('div', {class:'notification'}, msg);
  document.body.appendChild(el);
  clearTimeout(APP._notifTimer);
  APP._notifTimer = setTimeout(() => el.remove(), duration);
}

// ═══════════════════════════════════════════════════════════════
// SUPABASE HELPERS
// ═══════════════════════════════════════════════════════════════
async function pushRoomState(patch) {
  const { error } = await db.from('rooms').update(patch).eq('code', APP.roomCode);
  if (error) console.error('pushState error', error);
}

async function deleteRoom() {
  if (!APP.roomCode) return;
  await db.from('rooms').delete().eq('code', APP.roomCode);
}

function subscribeToRoom(code) {
  if (APP._channel) { db.removeChannel(APP._channel); APP._channel = null; }
  APP._channel = db.channel('room:'+code)
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'rooms', filter:`code=eq.${code}` },
      payload => { onRoomUpdate(payload.new); })
    .subscribe();
}

function onRoomUpdate(row) {
  const prevPhase = APP.gameState?.phase;

  APP.players   = row.players   || [];
  APP.roles     = row.roles     || {};
  APP.gameState = row.game_state|| null;

  // Derive fascist knowledge for THIS player whenever roles arrive.
  // Fascists always see all other fascists + Hitler.
  // Hitler sees fascists only in 5-6 player games.
  // Liberals see nobody.
  if (Object.keys(APP.roles).length > 0) {
    const myRole = APP.roles[APP.myId];
    if (myRole === 'fascist') {
      APP.fascistKnowledge = Object.entries(APP.roles)
        .filter(([id, r]) => (r === 'fascist' || r === 'hitler') && id !== APP.myId)
        .map(([id, r]) => ({ id, role:r, name: APP.players.find(p=>p.id===id)?.name||'?' }));
    } else if (myRole === 'hitler' && APP.players.length <= 6) {
      APP.fascistKnowledge = Object.entries(APP.roles)
        .filter(([id, r]) => r === 'fascist')
        .map(([id, r]) => ({ id, role:'fascist', name: APP.players.find(p=>p.id===id)?.name||'?' }));
    } else {
      APP.fascistKnowledge = [];
    }
  }

  // Sync screen from Supabase — drives all non-host transitions
  if (row.screen && row.screen !== APP.screen) {
    APP.screen = row.screen;
    // Reset night reveal for everyone when entering night phase
    if (row.screen === 'night') {
      APP.nightRevealed = false;
      APP.roleVisible = false;
    }
  }

  // Auto-switch left tab to action on vote/legislation phases
  if (APP.gameState) {
    const p = APP.gameState.phase;
    if (['vote','vote_result','president_discard','chancellor_discard'].includes(p)) {
      APP.leftTab = 'action';
    } else if (prevPhase && prevPhase !== p && p === 'nomination') {
      APP.leftTab = 'board';
    }
  }

  // Check win — any client detects and shows win screen
  if (APP.gameState && !APP.winState) {
    const win = checkWin(APP.gameState);
    if (win) {
      APP.winState = win;
      APP.screen = 'win';
    }
  }

  // Host resolves vote when all players have voted
  if (APP.isHost && APP.gameState && APP.screen === 'game') {
    checkVoteTally();
  }

  render();
}

// ═══════════════════════════════════════════════════════════════
// LOBBY ACTIONS
// ═══════════════════════════════════════════════════════════════
async function createRoom() {
  if (!APP.myName.trim()) { notify('Enter your name first'); return; }
  const code = generateCode();
  const me = { id:APP.myId, name:APP.myName.trim(), alive:true };
  APP.screen = 'loading';
  render();
  const { error } = await db.from('rooms').insert({
    code,
    host_id: APP.myId,
    players: [me],
    roles: {},
    game_state: {
      phase:'waiting', round:1, president_id:null, chancellor_id:null,
      liberal_policies:0, fascist_policies:0, election_tracker:0,
      draw_pile:[], discard_pile:[], president_cards:[], chancellor_cards:[],
      votes:{}, nominated_chancellor:null, last_president_id:null, last_chancellor_id:null,
      executive_action:null, veto_requested:false, peek_result:null,
      investigate_result:null, hitler_killed:false, hitler_elected:false, log:[],
    },
    screen: 'waiting',
  });
  if (error) { APP.screen='lobby'; notify('Failed to create room: '+error.message); render(); return; }
  APP.roomCode = code;
  APP.hostId = APP.myId;
  APP.isHost = true;
  APP.players = [me];
  APP.screen = 'waiting';
  subscribeToRoom(code);
  render();
}

async function joinRoom() {
  if (!APP.myName.trim()) { notify('Enter your name first'); return; }
  const code = APP.joinCodeInput.trim().toUpperCase();
  if (!code) { notify('Enter a room code'); return; }
  APP.screen = 'loading';
  render();

  const { data, error } = await db.from('rooms').select().eq('code', code).single();
  if (error || !data) { APP.screen='lobby'; notify('Room not found — check the code'); render(); return; }
  if (data.screen === 'game' || data.screen === 'night') { APP.screen='lobby'; notify('That game has already started'); render(); return; }

  const alreadyIn = data.players.find(p => p.id === APP.myId);
  if (!alreadyIn) {
    const me = { id:APP.myId, name:APP.myName.trim(), alive:true };
    const updated = [...data.players, me];
    await db.from('rooms').update({ players: updated }).eq('code', code);
    // Re-fetch so we have the updated player list
    const { data: fresh } = await db.from('rooms').select().eq('code', code).single();
    if (fresh) Object.assign(data, fresh);
  }

  APP.roomCode = code;
  APP.hostId = data.host_id;
  APP.isHost = data.host_id === APP.myId;
  APP.players = data.players || [];
  APP.roles = data.roles || {};
  APP.gameState = data.game_state;
  // Use the screen stored in Supabase, not a hardcoded value
  APP.screen = data.screen || 'waiting';
  subscribeToRoom(code);
  render();
}

async function removePlayer(id) {
  const updated = APP.players.filter(p=>p.id!==id);
  APP.players = updated;
  await pushRoomState({ players: updated });
  render();
}

// ═══════════════════════════════════════════════════════════════
// GAME START
// ═══════════════════════════════════════════════════════════════
async function startGame() {
  if (APP.players.length < 5) { notify('Need at least 5 players'); return; }

  const assignedRoles = assignRoles(APP.players.map(p=>p.id));
  const deck = shuffle(INITIAL_DECK);

  const gs = {
    phase: 'nomination', round: 1,
    president_id: APP.players[0].id,
    chancellor_id: null, nominated_chancellor: null,
    liberal_policies: 0, fascist_policies: 0,
    election_tracker: 0,
    draw_pile: deck, discard_pile: [],
    president_cards: [], chancellor_cards: [],
    votes: {}, last_president_id: null, last_chancellor_id: null,
    executive_action: null, veto_requested: false,
    peek_result: null, investigate_result: null,
    hitler_killed: false, hitler_elected: false,
    log: [{ round:1, text:`Game started with ${APP.players.length} players.` }],
  };

  APP.roles = assignedRoles;
  APP.gameState = gs;
  APP.screen = 'night';
  APP.nightRevealed = false;

  // Derive fascist knowledge for host (same logic as onRoomUpdate)
  const myRole = assignedRoles[APP.myId];
  if (myRole === 'fascist') {
    APP.fascistKnowledge = Object.entries(assignedRoles)
      .filter(([id, r]) => (r === 'fascist' || r === 'hitler') && id !== APP.myId)
      .map(([id, r]) => ({ id, role:r, name:APP.players.find(p=>p.id===id)?.name||'?' }));
  } else if (myRole === 'hitler' && APP.players.length <= 6) {
    APP.fascistKnowledge = Object.entries(assignedRoles)
      .filter(([id, r]) => r === 'fascist')
      .map(([id, r]) => ({ id, role:'fascist', name:APP.players.find(p=>p.id===id)?.name||'?' }));
  } else {
    APP.fascistKnowledge = [];
  }

  await pushRoomState({ roles: assignedRoles, game_state: gs, screen: 'night' });
  render();
}

// ═══════════════════════════════════════════════════════════════
// GAME ACTIONS — all go through pushRoomState
// ═══════════════════════════════════════════════════════════════
function addLog(gs, text) {
  return { ...gs, log: [...(gs.log||[]), { round:gs.round, text }] };
}

async function nominateChancellor(playerId) {
  const gs = APP.gameState;
  if (gs.president_id !== APP.myId) return;
  const nominee = APP.players.find(p=>p.id===playerId);
  const president = APP.players.find(p=>p.id===gs.president_id);
  let newGs = addLog(gs, `${president?.name} nominated ${nominee?.name} as Chancellor.`);
  newGs = { ...newGs, nominated_chancellor: playerId, phase: 'vote' };
  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  render();
}

async function castVote(vote) {
  const gs = APP.gameState;
  if (gs.votes[APP.myId] !== undefined) return;

  // Each player submits their own vote
  const newVotes = { ...gs.votes, [APP.myId]: vote };
  let newGs = { ...gs, votes: newVotes };

  // Check if all alive players have now voted — any client can detect this
  // but only the host resolves it to avoid race conditions
  const alive = APP.players.filter(p => p.alive);
  const allVoted = alive.every(p => newVotes[p.id] !== undefined);

  if (allVoted && APP.isHost) {
    const jas  = alive.filter(p => newVotes[p.id] === 'ja').length;
    const neins = alive.filter(p => newVotes[p.id] === 'nein').length;
    newGs = await resolveVote(newGs, newVotes, jas > neins);
  }

  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  render();
}

// Host watches incoming vote updates and resolves when all players have voted
async function checkVoteTally() {
  const gs = APP.gameState;
  if (!APP.isHost || gs?.phase !== 'vote') return;
  const alive = APP.players.filter(p => p.alive);
  const allVoted = alive.every(p => gs.votes?.[p.id] !== undefined);
  if (!allVoted) return;
  // Already resolved if phase changed — guard against double-resolve
  if (gs.phase !== 'vote') return;
  const jas  = alive.filter(p => gs.votes[p.id] === 'ja').length;
  const neins = alive.filter(p => gs.votes[p.id] === 'nein').length;
  let newGs = await resolveVote({ ...gs }, gs.votes, jas > neins);
  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  render();
}

async function resolveVote(gs, votes, passed) {
  const nominated = APP.players.find(p=>p.id===gs.nominated_chancellor);
  const president = APP.players.find(p=>p.id===gs.president_id);

  if (passed) {
    const nomRole = APP.roles[gs.nominated_chancellor];
    if (nomRole === 'hitler' && gs.fascist_policies >= 3) {
      let newGs = addLog(gs, `${nominated?.name} elected — Hitler is in power!`);
      newGs = { ...newGs, phase:'vote_result', chancellor_id:gs.nominated_chancellor, hitler_elected:true, votes };
      setTimeout(async () => { APP.winState={winner:'fascist',reason:'Hitler was elected Chancellor!'}; APP.screen='win'; await deleteRoom(); render(); }, 1800);
      return newGs;
    }
    let newGs = addLog(gs, `Vote passed. ${president?.name} & ${nominated?.name} form the government.`);
    newGs = { ...newGs, phase:'vote_result', chancellor_id:gs.nominated_chancellor, election_tracker:0, votes };
    setTimeout(async () => {
      await beginLegislation();
    }, 2200);
    return newGs;
  } else {
    const newTracker = gs.election_tracker + 1;
    let newGs = addLog(gs, `Vote failed. Election tracker: ${newTracker}.`);
    if (newTracker >= 3) {
      newGs = addLog(newGs, 'Country in chaos! Top policy auto-enacted.');
      newGs = { ...newGs, votes, phase:'vote_result' };
      setTimeout(async () => {
        const cur = APP.gameState;
        const deck = cur.draw_pile.length > 0 ? cur.draw_pile : shuffle(INITIAL_DECK);
        const [top, ...rest] = deck;
        await enactPolicy(top, rest, cur.discard_pile, true, 0);
      }, 2200);
      return newGs;
    }
    const nextPres = nextPresId(gs.president_id, APP.players);
    newGs = { ...newGs, phase:'vote_result', election_tracker:newTracker, votes };
    setTimeout(async () => {
      const cur = APP.gameState;
      // Guard: only advance if still in vote_result (not already moved on)
      if (cur.phase !== 'vote_result') return;
      let next = { ...cur, phase:'nomination', round:cur.round+1, president_id:nextPres, nominated_chancellor:null, votes:{}, chancellor_id:null };
      APP.gameState = next;
      await pushRoomState({ game_state: next });
      render();
    }, 2200);
    return newGs;
  }
}

async function beginLegislation() {
  const gs = APP.gameState;
  let deck = [...gs.draw_pile];
  let discard = [...gs.discard_pile];
  if (deck.length < 3) { deck = shuffle([...deck, ...discard]); discard = []; }
  const drawn = deck.splice(0,3);
  const newGs = { ...gs, phase:'president_discard', draw_pile:deck, discard_pile:discard, president_cards:drawn, chancellor_cards:[] };
  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  render();
}

async function presidentDiscard(idx) {
  const gs = APP.gameState;
  if (gs.president_id !== APP.myId) return;
  const cards = [...gs.president_cards];
  const [discarded] = cards.splice(idx,1);
  let newGs = addLog(gs, 'President discarded a policy.');
  newGs = { ...newGs, phase:'chancellor_discard', president_cards:[], chancellor_cards:cards, discard_pile:[...gs.discard_pile, discarded] };
  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  render();
}

async function chancellorDiscard(idx) {
  const gs = APP.gameState;
  if (gs.chancellor_id !== APP.myId) return;
  const cards = [...gs.chancellor_cards];
  const [discarded] = cards.splice(idx,1);
  const enacted = cards[0];
  let newGs = addLog(gs, 'Chancellor discarded a policy.');
  APP.gameState = newGs;
  await enactPolicy(enacted, gs.draw_pile, [...gs.discard_pile, discarded], false, gs.election_tracker);
}


async function enactPolicy(policy, deck, discard, chaos, tracker) {
  const gs = APP.gameState;
  const newLib = policy==='liberal' ? gs.liberal_policies+1 : gs.liberal_policies;
  const newFas = policy==='fascist' ? gs.fascist_policies+1 : gs.fascist_policies;
  let newGs = addLog(gs, `📜 ${policy.toUpperCase()} policy enacted!`);
  const win = checkWin({ ...gs, liberal_policies:newLib, fascist_policies:newFas });
  let execAction = (!chaos && policy==='fascist') ? getExecAction(newFas, APP.players.length) : null;
  const nextPres = nextPresId(gs.president_id, APP.players);
  newGs = {
    ...newGs,
    liberal_policies: newLib, fascist_policies: newFas,
    draw_pile: deck, discard_pile: discard,
    phase: win ? 'win' : execAction ? 'executive' : 'nomination',
    executive_action: execAction,
    round: newGs.round + 1,
    president_id: execAction ? gs.president_id : nextPres,
    chancellor_id: execAction ? gs.chancellor_id : null,
    last_president_id: gs.president_id, last_chancellor_id: gs.chancellor_id,
    nominated_chancellor: null, president_cards:[], chancellor_cards:[],
    votes:{}, election_tracker: chaos ? 0 : tracker,
    peek_result:null, investigate_result:null, veto_requested:false,
  };
  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  if (win) { setTimeout(async ()=>{ APP.winState=win; APP.screen='win'; await deleteRoom(); render(); }, 500); }
  render();
}

async function executePeek() {
  const gs = APP.gameState;
  let deck = [...gs.draw_pile];
  if (deck.length < 3) deck = shuffle([...deck, ...gs.discard_pile]);
  const peeked = deck.slice(0,3);
  let newGs = addLog(gs, 'President peeked at the top 3 policy cards.');
  newGs = { ...newGs, peek_result: peeked };
  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  render();
}

async function executeInvestigate(targetId) {
  const gs = APP.gameState;
  const target = APP.players.find(p=>p.id===targetId);
  const party = APP.roles[targetId]==='liberal' ? 'liberal' : 'fascist';
  let newGs = addLog(gs, `President investigated ${target?.name}'s party.`);
  newGs = { ...newGs, investigate_result: { name:target?.name, party } };
  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  render();
}

async function executeSpecialElect(targetId) {
  const gs = APP.gameState;
  const target = APP.players.find(p=>p.id===targetId);
  let newGs = addLog(gs, `Special election: ${target?.name} is the new President.`);
  newGs = { ...newGs, phase:'nomination', president_id:targetId, executive_action:null, nominated_chancellor:null, chancellor_id:null };
  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  render();
}

async function executeKill(targetId) {
  const gs = APP.gameState;
  const target = APP.players.find(p=>p.id===targetId);
  let newGs = addLog(gs, `President executed ${target?.name}.`);
  const hitlerKilled = APP.roles[targetId]==='hitler';
  const newPlayers = APP.players.map(p => p.id===targetId ? {...p,alive:false} : p);
  APP.players = newPlayers;
  if (hitlerKilled) {
    newGs = addLog(newGs, `${target?.name} was Hitler! Liberals win!`);
    newGs = { ...newGs, hitler_killed:true, phase:'win' };
    APP.gameState = newGs;
    await pushRoomState({ players:newPlayers, game_state:newGs });
    setTimeout(async ()=>{ APP.winState={winner:'liberal',reason:'Hitler was assassinated!'}; APP.screen='win'; await deleteRoom(); render(); }, 500);
    render();
    return;
  }
  const nextPres = nextPresId(gs.president_id, newPlayers);
  newGs = { ...newGs, phase:'nomination', executive_action:null, president_id:nextPres, chancellor_id:null, nominated_chancellor:null };
  APP.gameState = newGs;
  await pushRoomState({ players:newPlayers, game_state:newGs });
  render();
}

async function doneWithExecutive() {
  const gs = APP.gameState;
  const nextPres = nextPresId(gs.president_id, APP.players);
  const newGs = { ...gs, phase:'nomination', executive_action:null, president_id:nextPres, chancellor_id:null, nominated_chancellor:null, peek_result:null, investigate_result:null };
  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  render();
}

async function requestVeto() {
  const gs = APP.gameState;
  let newGs = addLog(gs, 'Chancellor requested a veto.');
  newGs = { ...newGs, veto_requested:true };
  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  render();
}

async function respondVeto(accept) {
  const gs = APP.gameState;
  if (accept) {
    const newTracker = gs.election_tracker+1;
    let newGs = addLog(gs, 'President accepted veto. Both policies discarded.');
    const newDiscard = [...gs.discard_pile, ...gs.chancellor_cards];
    if (newTracker >= 3) {
      newGs = addLog(newGs, 'Country in chaos! Top policy auto-enacted.');
      const deck = gs.draw_pile.length>0 ? gs.draw_pile : shuffle(INITIAL_DECK);
      const [top,...rest] = deck;
      APP.gameState = newGs;
      await enactPolicy(top, rest, newDiscard, true, 0);
    } else {
      const nextPres = nextPresId(gs.president_id, APP.players);
      newGs = { ...newGs, election_tracker:newTracker, discard_pile:newDiscard, chancellor_cards:[], phase:'nomination', round:newGs.round+1, president_id:nextPres, chancellor_id:null, nominated_chancellor:null, votes:{}, veto_requested:false };
      APP.gameState = newGs;
      await pushRoomState({ game_state:newGs });
      render();
    }
  } else {
    let newGs = addLog(gs, 'President rejected veto. Chancellor must enact a policy.');
    newGs = { ...newGs, veto_requested:false };
    APP.gameState = newGs;
    await pushRoomState({ game_state: newGs });
    render();
  }
}

async function resetGame() {
  APP.winState = null;
  APP.roles = {};
  APP.fascistKnowledge = [];
  APP.screen = 'waiting';
  const gs = {
    phase:'waiting', round:1, president_id:null, chancellor_id:null,
    liberal_policies:0, fascist_policies:0, election_tracker:0,
    draw_pile:[], discard_pile:[], president_cards:[], chancellor_cards:[],
    votes:{}, nominated_chancellor:null, last_president_id:null, last_chancellor_id:null,
    executive_action:null, veto_requested:false, peek_result:null,
    investigate_result:null, hitler_killed:false, hitler_elected:false, log:[],
  };
  APP.gameState = gs;
  await pushRoomState({ roles:{}, game_state:gs, screen:'waiting' });
  render();
}

function leaveRoom() {
  if (APP._channel) { db.removeChannel(APP._channel); APP._channel=null; }
  APP.screen='lobby'; APP.roomCode=null; APP.hostId=null; APP.isHost=false;
  APP.players=[]; APP.roles={}; APP.gameState=null; APP.winState=null;
  APP.fascistKnowledge=[]; APP.nightRevealed=false; APP.roleVisible=false;
  render();
}

function buildNight() {
  const myRole = APP.roles[APP.myId];
  const fascistKnowledge = APP.fascistKnowledge;
  const otherFascists = fascistKnowledge.filter(f=>f.id!==APP.myId&&f.role==='fascist');
  const hitlerInfo = fascistKnowledge.find(f=>f.role==='hitler');
  const hitlerKnowsFascists = APP.players.length<=6;

  const allies = [];
  if (myRole==='fascist') {
    otherFascists.forEach(f => allies.push(h('p',{},'🔴 ',f.name,' ',h('span',{class:'text-burg',style:{fontSize:'.8rem'}},'(Fascist)'))));
    if (hitlerInfo) allies.push(h('p',{style:{marginTop:'6px'}},'☠ ',hitlerInfo.name,' ',h('span',{class:'text-bronze',style:{fontSize:'.8rem'}},'(Hitler)')));
  }
  if (myRole==='hitler'&&hitlerKnowsFascists) {
    otherFascists.forEach(f => allies.push(h('p',{},'🔴 ',f.name)));
  }

  const knowledgeBox = allies.length>0 ? h('div',{class:'fascist-knowledge'},
    h('h3',{},myRole==='hitler'?'⚡ Fascist Allies (5-6p)':'⚡ Your Allies'),
    ...allies
  ) : null;

  const hint = myRole==='liberal'
    ? h('p',{class:'night-hint'},"You don't know who is who. Trust your instincts and watch the policies.")
    : null;

  const btn = !APP.nightRevealed
    ? h('button',{class:'btn btn-primary btn-lg',onClick:()=>{ APP.nightRevealed=true; APP.roleVisible=true; render(); }},"I've memorized my role")
    : APP.isHost
      ? h('button',{class:'btn btn-primary btn-lg',onClick:async()=>{ APP.roleVisible=true; APP.screen='game'; await pushRoomState({screen:'game'}); render(); }},'Begin the Game →')
      : h('div',{style:{textAlign:'center'}},
          h('p',{class:'text-dim italic',style:{marginTop:'8px'}},'Waiting for host to begin the game…'),
          h('p',{class:'text-faint italic',style:{fontSize:'.8rem',marginTop:'6px'}},'Your role has been saved — you\'ll see it in the 🎭 My ID tab once the game starts.')
        );

  return h('div',{class:'night-phase'},
    h('div',{class:'night-label'},'Your Role'),
    h('div',{class:`role-card ${myRole}`},
      h('div',{class:'role-icon'},myRole==='liberal'?'🏛':myRole==='fascist'?'⚡':'☠'),
      h('div',{class:'role-name'},myRole),
      h('div',{class:'role-desc'},
        myRole==='liberal'?'Enact 5 Liberal policies or find and eliminate Hitler to win.':

    hint,
    btn
  );
}

function buildBoardTab() {
  const gs = APP.gameState;
  const lib = gs?.liberal_policies||0;
  const fas = gs?.fascist_policies||0;
  const bracket = APP.players.length<=6?'5-6':APP.players.length<=8?'7-8':'9-10';
  const fascistActions = EXECUTIVE_ACTIONS[bracket];
  const actionLabels = {peek:'Peek',investigate:'Investigate',special_elect:'Spec.Elect',kill:'Execute'};

  const libSlots = Array.from({length:5},(_,i)=>
    h('div',{class:`policy-slot liberal-slot${i<lib?' filled':''}` },i<lib?'🔵':'')
  );
  const fasSlots = Array.from({length:6},(_,i)=>{
    const action=fascistActions[i];
    const s=h('div',{class:`policy-slot fascist-slot${i<fas?' filled':''}`},i<fas?'🔴':'');
    if(action) s.appendChild(h('span',{class:'action-badge'},actionLabels[action]));
    return s;
  });

  const tracker = gs?.election_tracker||0;
  const dots = [0,1,2].map(i=>h('div',{class:`tracker-dot${i<tracker?' active':''}`}));
  const chaosWarning = tracker>=2 ? h('span',{class:'chaos-warning'},'⚠ CHAOS') : null;

  return h('div',{},
    h('div',{class:'policy-tracks'},
      h('div',{class:'policy-track liberal-track'},
        h('div',{class:'track-header'},
          h('span',{class:'track-label liberal'},'🏛 Liberal Policies'),
          h('span',{class:'track-count liberal'},`${lib}/5`)
        ),
        h('div',{class:'policy-slots'},...libSlots)
      ),
      h('div',{class:'policy-track fascist-track'},
        h('div',{class:'track-header'},
          h('span',{class:'track-label fascist'},'⚡ Fascist Policies'),
          h('span',{class:'track-count fascist'},`${fas}/6`)
        ),
        h('div',{class:'policy-slots',style:{marginBottom:'28px'}},...fasSlots)
      )
    ),
    h('div',{class:'election-tracker'},
      h('span',{class:'tracker-label'},'Failed Elections'),
      h('div',{class:'tracker-dots'},...dots),
      chaosWarning
    )
  );
}

function buildActionTab() {
  const gs = APP.gameState;
  const phase = gs?.phase;
  const amPres = gs?.president_id===APP.myId;
  const amChanc = gs?.chancellor_id===APP.myId;
  const hasVoted = gs?.votes?.[APP.myId]!==undefined;
  const alive = APP.players.filter(p=>p.alive);
  const pres = APP.players.find(p=>p.id===gs?.president_id);
  const chanc = APP.players.find(p=>p.id===gs?.chancellor_id);
  const nominated = APP.players.find(p=>p.id===gs?.nominated_chancellor);
  const jaCount = Object.values(gs?.votes||{}).filter(v=>v==='ja').length;
  const neinCount = Object.values(gs?.votes||{}).filter(v=>v==='nein').length;
  const vetoUnlocked = gs?.fascist_policies>=5;

  const content = [];

  // VOTE
  if (phase==='vote'||phase==='vote_result') {
    content.push(
      h('div',{},
        h('div',{class:'vote-gov-header'},'Proposed Government'),
        h('div',{class:'vote-gov-names'},
          h('span',{class:'text-bronze'},pres?.name||'?'),
          h('span',{class:'text-faint',style:{margin:'0 8px'}},'·'),
          h('span',{class:'text-steel'},nominated?.name||'?')
        ),
        h('div',{class:'vote-gov-roles'},'PRESIDENT · CHANCELLOR')
      )
    );

    if (phase==='vote') {
      const myP = APP.players.find(p=>p.id===APP.myId);
      if (!hasVoted&&myP?.alive) {
        content.push(
          h('p',{class:'text-dim italic',style:{fontSize:'.85rem'}},'Do you approve this government?'),
          h('div',{class:'vote-buttons'},
            h('button',{class:'btn btn-liberal vote-btn btn-full',onClick:()=>castVote('ja')},'👍 Ja!'),
            h('button',{class:'btn btn-fascist vote-btn btn-full',onClick:()=>castVote('nein')},'👎 Nein!')
          )
        );
      } else {
        const myVote = gs.votes?.[APP.myId];
        content.push(
          h('div',{class:`vote-confirm ${myVote||'ja'}`},
            myP?.alive ? `You voted ${(myVote||'').toUpperCase()}` : 'You are not voting (dead)'
          )
        );
      }
      content.push(
        h('div',{class:'vote-status-row'},
          h('span',{},`${Object.keys(gs.votes||{}).length}/${alive.length} voted`),
          h('span',{class:'text-faint'},'·'),
          h('span',{},'Waiting for others…')
        )
      );
    }

    if (phase==='vote_result') {
      content.push(
        h('div',{class:'phase-title',style:{fontSize:'1.1rem'}},jaCount>neinCount?'✅ Vote Passed!':'❌ Vote Failed!'),
        h('div',{class:'vote-result-breakdown'},
          ...APP.players.filter(p=>gs.votes?.[p.id]!==undefined).map(p=>
            h('div',{class:`vr-chip ${gs.votes[p.id]}`},gs.votes[p.id]==='ja'?'👍':'👎',' ',p.name)
          )
        ),
        h('p',{class:'text-faint italic',style:{fontSize:'.8rem'}},`${jaCount} Ja · ${neinCount} Nein`)
      );
    }
  }

  // PRESIDENT DISCARD
  if (phase==='president_discard') {
    content.push(h('div',{class:'phase-title',style:{fontSize:'1rem'}},'Legislative Session'));
    if (amPres) {
      content.push(
        h('p',{class:'text-dim italic',style:{fontSize:'.85rem'}},'Choose one policy to discard'),
        h('div',{class:'policy-cards-area'},
          ...gs.president_cards.map((card,i)=>
            h('div',{class:`policy-card ${card}-policy`,onClick:()=>presidentDiscard(i)},
              h('span',{class:'policy-card-icon'},card==='liberal'?'🔵':'🔴'),
              h('span',{class:'policy-card-type'},card)
            )
          )
        ),
        h('p',{class:'text-faint italic',style:{fontSize:'.75rem'}},'Click to discard — the others go to Chancellor')
      );
    } else {
      content.push(h('p',{class:'text-dim italic'},h('strong',{class:'text-bronze'},pres?.name),' is reviewing policy cards…'));
    }
  }

  // CHANCELLOR DISCARD
  if (phase==='chancellor_discard') {
    content.push(h('div',{class:'phase-title',style:{fontSize:'1rem'}},"Chancellor's Choice"));
    if (amChanc) {
      if (vetoUnlocked&&!gs.veto_requested) {
        content.push(h('div',{class:'veto-area'},
          h('div',{class:'veto-title'},'⚖ Veto Power Unlocked'),
          h('p',{class:'veto-sub'},'Request to discard both. President must agree.'),
          h('button',{class:'btn btn-ghost btn-sm',onClick:requestVeto},'Request Veto')
        ));
      }
      if (gs.veto_requested) {
        content.push(h('p',{class:'text-bronze italic'},'Veto requested. Awaiting President…'));
      } else {
        content.push(
          h('p',{class:'text-dim italic',style:{fontSize:'.85rem'}},'Choose one policy to discard — the other will be enacted'),
          h('div',{class:'policy-cards-area'},
            ...gs.chancellor_cards.map((card,i)=>
              h('div',{class:`policy-card ${card}-policy`,onClick:()=>chancellorDiscard(i)},
                h('span',{class:'policy-card-icon'},card==='liberal'?'🔵':'🔴'),
                h('span',{class:'policy-card-type'},card)
              )
            )
          )
        );
      }
    } else if (amPres&&gs.veto_requested) {
      content.push(
        h('p',{class:'text-dim italic'},'Chancellor requests a veto. Do you agree?'),
        h('div',{class:'flex-row',style:{width:'100%'}},
          h('button',{class:'btn btn-liberal btn-sm',style:{flex:1},onClick:()=>respondVeto(true)},'Accept'),
          h('button',{class:'btn btn-fascist btn-sm',style:{flex:1},onClick:()=>respondVeto(false)},'Reject')
        )
      );
    } else {
      content.push(h('p',{class:'text-dim italic'},h('strong',{class:'text-steel'},chanc?.name),' is choosing a policy…'));
    }
  }

  if (!['vote','vote_result','president_discard','chancellor_discard'].includes(phase)) {
    content.push(h('p',{class:'action-idle'},'No action required right now'));
  }

  return h('div',{class:'vote-tab-content'},...content);
}

function buildExecutivePanel() {
  const gs = APP.gameState;
  const amPres = gs?.president_id===APP.myId;
  const pres = APP.players.find(p=>p.id===gs?.president_id);
  const content = [h('div',{class:'phase-title',style:{color:'var(--burg-light)'}},'⚡ Executive Action')];

  if (gs.executive_action==='peek') {
    content.push(h('p',{class:'phase-sub'},amPres?'You may peek at the top 3 policy cards.':pres?.name+' is using the policy peek.'));
    if (amPres&&!gs.peek_result) content.push(h('button',{class:'btn btn-primary',onClick:executePeek},'Peek at Policies'));
    if (gs.peek_result) {
      content.push(
        h('div',{class:'peek-cards'},
          ...gs.peek_result.map((c,i)=>h('div',{class:`peek-card ${c}`},c==='liberal'?'🔵':'🔴'))
        ),
        h('p',{class:'text-dim italic',style:{fontSize:'.85rem'}},'Top 3 policies (do not reveal!)'),
        h('button',{class:'btn btn-secondary btn-sm',onClick:doneWithExecutive},'Done')
      );
    }
  }
  if (gs.executive_action==='investigate') {
    content.push(h('p',{class:'phase-sub'},amPres?'Select a player to investigate their party.':pres?.name+' is investigating…'));
    if (gs.investigate_result) {
      content.push(
        h('div',{class:'investigate-result'},
          h('p',{class:'text-dim',style:{fontSize:'.85rem'}},gs.investigate_result.name+"'s party:"),
          h('div',{class:`investigate-party ${gs.investigate_result.party}`},
            gs.investigate_result.party==='liberal'?'🔵 LIBERAL':'🔴 FASCIST'
          ),
          h('p',{class:'text-faint italic',style:{fontSize:'.75rem',marginTop:'8px'}},'Only you can see this.')
        ),
        h('button',{class:'btn btn-secondary btn-sm',style:{marginTop:'12px'},onClick:doneWithExecutive},'Done')
      );
    }
  }
  if (gs.executive_action==='special_elect') {
    content.push(h('p',{class:'phase-sub'},amPres?'Select a player to make them next President.':pres?.name+' is calling a special election…'));
  }
  if (gs.executive_action==='kill') {
    content.push(h('p',{class:'phase-sub',style:{color:'var(--burg-light)'}},amPres?'Select a player above to execute them.':pres?.name+' must execute a player…'));
  }

  return h('div',{class:'panel'},h('div',{class:'phase-area'},...content));
}

// ─── RIGHT PANEL ──────────────────────────────────────────────
function buildRightPanel() {
  const gs = APP.gameState;
  const phase = gs?.phase;
  const amPres = gs?.president_id===APP.myId;

  // nomination prompt
  let promptIcon='', promptText=null;
  if (phase==='nomination') {
    if (amPres) { promptIcon='👑'; promptText=h('span',{},h('strong',{class:'text-bronze'},'You are President.'),' Click an eligible player to nominate a Chancellor.'); }
    else { const p=APP.players.find(pp=>pp.id===gs.president_id); promptIcon='⏳'; promptText=h('span',{},h('strong',{class:'text-bronze'},p?.name),' is choosing a Chancellor…'); }
  } else if (phase==='executive'&&amPres) {
    const a=gs.executive_action;
    promptIcon = a==='kill'?'☠':a==='investigate'?'🔍':a==='special_elect'?'🗳':'⚡';
    promptText=h('span',{},h('strong',{class:'text-bronze'},'Executive Action:'),' ',
      a==='kill'?'Click a player to execute them.':
      a==='investigate'?'Click a player to investigate their party.':
      a==='special_elect'?'Click a player to make them next President.':''
    );
  }

  const tabs = h('div',{class:'panel-tabs'},
    h('button',{class:'panel-tab'+(APP.rightTab==='players'?' active':''),onClick:()=>{ APP.rightTab='players'; APP.identityOpen=false; render(); }},'Players'),
    h('button',{class:'panel-tab'+(APP.rightTab==='log'?' active':''),onClick:()=>{ APP.rightTab='log'; APP.identityOpen=false; render(); }},
      'Game Log',
      APP.rightTab!=='log'&&gs?.log?.length?h('span',{class:'tab-dot'}):null
    ),
    h('button',{
      class:'panel-tab'+(APP.rightTab==='identity'?' active':''),
      style:{opacity:APP.roleVisible?1:.3, cursor:APP.roleVisible?'pointer':'not-allowed'},
      onClick:()=>{
        if (!APP.roleVisible) return;
        if (APP.rightTab==='identity') { APP.identityOpen=false; APP.rightTab='players'; }
        else APP.rightTab='identity';
        render();
      }
    },'🎭 My ID')
  );

  let tabContent;
  if (APP.rightTab==='players') {
    const isEligible = id => {
      if (!APP.players.find(p=>p.id===id)?.alive) return false;
      if (id===gs?.president_id) return false;
      if (id===gs?.last_president_id) return false;
      if (APP.players.filter(p=>p.alive).length>5&&id===gs?.last_chancellor_id) return false;
      return true;
    };

    const cards = APP.players.map(p=>{
      const isMe = p.id===APP.myId;
      const isPresident = p.id===gs?.president_id;
      const isChancellor = p.id===gs?.chancellor_id;
      const canSelect =
        (phase==='nomination'&&amPres&&p.id!==APP.myId&&isEligible(p.id)) ||
        (phase==='executive'&&amPres&&gs?.executive_action!=='peek'&&p.id!==APP.myId&&p.alive);
      const notEligible = phase==='nomination'&&amPres&&!isEligible(p.id)&&p.id!==APP.myId;

      let cls = 'player-card';
      if (isMe) cls+=' is-me';
      if (isPresident) cls+=' is-president';
      if (isChancellor) cls+=' is-chancellor';
      if (!p.alive) cls+=' is-dead';
      if (canSelect) cls+=' selectable';
      if (notEligible) cls+=' not-eligible';

      const onClick = canSelect ? ()=>{
        if (phase==='nomination'&&amPres) nominateChancellor(p.id);
        else if (phase==='executive'&&amPres) {
          const a=gs.executive_action;
          if (a==='investigate') executeInvestigate(p.id);
          else if (a==='special_elect') executeSpecialElect(p.id);
          else if (a==='kill') executeKill(p.id);
        }
      } : null;

      const shownRole = APP.winState && APP.roles[p.id];

      return h('div',{class:cls,onClick},
        isPresident ? h('span',{class:'pc-badge pres'},'PRES') : null,
        isChancellor ? h('span',{class:'pc-badge chanc'},'CHANC') : null,
        !p.alive ? h('span',{class:'pc-badge dead'},'☠') : null,
        h('div',{class:'player-card-avatar'},p.name.charAt(0).toUpperCase()),
        h('div',{class:'player-card-name'},p.name+(isMe?' (You)':'')),
        shownRole ? h('div',{class:`player-card-role role-${shownRole}-badge`},
          shownRole==='liberal'?'🔵 Liberal':shownRole==='fascist'?'🔴 Fascist':'☠ Hitler'
        ) : null
      );
    });

    tabContent = h('div',{},
      promptText ? h('div',{class:'nomination-prompt'},
        h('span',{class:'nomination-prompt-icon'},promptIcon),
        h('span',{class:'nomination-prompt-text'},promptText)
      ) : null,
      h('div',{class:'player-grid'},...cards)
    );
  }

  if (APP.rightTab==='log') {
    const entries = (gs?.log||[]).map(e=>
      h('div',{class:'log-entry'},h('span',{class:'log-round'},'R'+e.round),e.text)
    );
    tabContent = h('div',{class:'game-log'},...entries);
    // Auto-scroll
    setTimeout(()=>{ const el=document.querySelector('.game-log'); if(el) el.scrollTop=el.scrollHeight; },50);
  }

  if (APP.rightTab==='identity') {
    const myRole = APP.roles[APP.myId];
    const fascistAllies = APP.fascistKnowledge.filter(f=>f.id!==APP.myId&&f.role==='fascist');
    const hitlerAlly = APP.fascistKnowledge.find(f=>f.role==='hitler');
    const hitlerKnows = APP.players.length<=6;

    if (!APP.identityOpen) {
      tabContent = h('div',{class:'identity-area'},
        h('p',{class:'identity-hidden-text'},'Your identity card is hidden. Tap below to reveal it privately.'),
        h('button',{class:'btn btn-secondary',onClick:()=>{ APP.identityOpen=true; render(); }},'🎭 Unhide Role')
      );
    } else {
      const alliesBox = [];
      if (myRole==='fascist') {
        fascistAllies.forEach(f => alliesBox.push(h('div',{class:'identity-ally'},'🔴 ',f.name,' ',h('span',{class:'text-burg',style:{fontSize:'.75rem'}},'(Fascist)'))));
        if (hitlerAlly) alliesBox.push(h('div',{class:'identity-ally',style:{marginTop:'4px'}},'☠ ',hitlerAlly.name,' ',h('span',{class:'text-bronze',style:{fontSize:'.75rem'}},'(Hitler)')));
      }
      if (myRole==='hitler'&&hitlerKnows&&fascistAllies.length>0) {
        fascistAllies.forEach(f => alliesBox.push(h('div',{class:'identity-ally'},'🔴 ',f.name)));
      }

      tabContent = h('div',{class:'identity-area'},
        h('div',{class:`identity-card ${myRole}`},
          h('button',{class:'identity-close',onClick:()=>{ APP.identityOpen=false; render(); }},'✕'),
          h('div',{class:'identity-eyebrow'},'Your Secret Identity'),
          h('div',{class:'identity-icon'},myRole==='liberal'?'🏛':myRole==='fascist'?'⚡':'☠'),
          h('div',{class:'identity-role'},myRole),
          h('div',{class:'identity-desc'},
            myRole==='liberal'?'Enact 5 Liberal policies or eliminate Hitler to win.':
            myRole==='fascist'?'Help Hitler rise. Enact 6 Fascist policies or elect Hitler as Chancellor.':
            'Stay hidden. Let your Fascist allies pave the way to power.'
          ),
          alliesBox.length>0 ? h('div',{class:'identity-allies'},
            h('div',{class:'identity-allies-title'},myRole==='hitler'?'⚡ Fascist Allies (5-6p)':'⚡ Your Allies'),
            ...alliesBox
          ) : null
        )
      );
    }
  }

  return h('div',{class:'panel'},
    h('div',{class:'panel-title'},'Players & Game'),
    tabs,
    tabContent
  );
}

// ─── WIN SCREEN ───────────────────────────────────────────────
function buildWin() {
  const win = APP.winState||{winner:'liberal',reason:'Game over'};
  const roleReveal = APP.players.map(p=>
    h('div',{class:'reveal-item'},
      h('div',{class:'reveal-name'},p.name+(p.id===APP.myId?' (You)':'')),
      h('div',{class:`reveal-role role-${APP.roles[p.id]}-badge`},
        APP.roles[p.id]==='liberal'?'🔵 Liberal':APP.roles[p.id]==='fascist'?'🔴 Fascist':'☠ Hitler'
      )
    )
  );

  return h('div',{class:'app'},
    h('div',{class:'win-screen'},
      h('div',{class:'win-icon'},win.winner==='liberal'?'🏛':'⚡'),
      h('div',{class:`win-title ${win.winner}`},win.winner==='liberal'?'Liberals Win!':'Fascists Win!'),
      h('div',{class:'win-reason'},win.reason),
      h('div',{class:'divider',style:{width:'100%',maxWidth:'500px'}}),
      h('p',{class:'text-faint italic cinzel',style:{fontSize:'.75rem',letterSpacing:'.15em',textTransform:'uppercase',marginBottom:'12px'}},'Role Reveal'),
      h('div',{class:'reveal-grid'},...roleReveal),
      h('div',{class:'win-actions'},
        APP.isHost ? h('button',{class:'btn btn-primary',onClick:resetGame},'Play Again') : null,
        h('button',{class:'btn btn-ghost',onClick:leaveRoom},'Leave Room')
      )
    )
  );
}

// ─── EXIT MODAL ───────────────────────────────────────────────
function buildExitModal() {
  return h('div',{class:'overlay',onClick:()=>{ APP.exitConfirm=false; render(); }},
    h('div',{class:'modal',onClick:e=>e.stopPropagation()},
      h('div',{class:'modal-icon'},'🚪'),
      h('div',{class:'modal-title'},'Leave the Game?'),
      h('p',{class:'modal-sub'},'The game is still in progress. Are you sure you want to abandon your post?'),
      h('div',{class:'modal-actions'},
        h('button',{class:'btn btn-ghost',onClick:()=>{ APP.exitConfirm=false; render(); }},'Stay'),
        h('button',{class:'btn btn-primary',onClick:leaveRoom},'Exit Game')
      )
    )
  );
}

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════
render();
</script>
