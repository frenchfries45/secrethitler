<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Secret Hitler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ─── VARIABLES ─────────────────────────────────────────── */
    :root {
      --burg: #7A2030;
      --burg-light: #9B3040;
      --steel: #6B8FAD;
      --steel-light: #8AAEC8;
      --bronze: #B08D57;
      --bronze-light: #C9A87A;
      --ivory: #E8E0D4;
      --ivory-dim: rgba(232,224,212,0.55);
      --ivory-faint: rgba(232,224,212,0.25);
      --navy: #0E1628;
      --navy2: #141E34;
      --navy3: #1A2540;
      --panel: #0F1628;
      --panel-border: rgba(176,141,87,0.2);
      --green-pass: #4E9A6E;
    }
    /* ─── CROSS-PLATFORM COLOR NORMALIZATION ───────────────── */
    /* Force sRGB color space on all platforms for consistency   */
    :root {
      color-scheme: dark;
      -webkit-text-size-adjust: 100%;
    }
    /* Replace low-alpha rgba backgrounds with opaque hex equivalents
       to avoid Android/iOS compositing differences */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      background: var(--navy); color: var(--ivory);
      font-family: 'Crimson Text', serif; min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 50%, #1A1020 0%, #0E1628 55%),
        radial-gradient(ellipse at 80% 15%, #101520 0%, #0E1628 50%);
    }
    .app { min-height: 100vh; display: flex; flex-direction: column; }

    /* ─── HEADER ─────────────────────────────────────────────── */
    .header {
      text-align: center; padding: 22px 16px 14px;
      border-bottom: 1px solid var(--panel-border);
      background: linear-gradient(180deg, rgba(122,32,48,0.14) 0%, transparent 100%);
      position: relative;
    }
    .header-exit-btn {
      position: absolute; top: 50%; right: 14px; transform: translateY(-50%);
      background: none; border: 1px solid rgba(232,224,212,.18);
      color: rgba(232,224,212,.45); font-size: .75rem; font-family: 'Cinzel', serif;
      letter-spacing: .08em; padding: 6px 12px; border-radius: 6px;
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .header-exit-btn:hover { border-color: var(--burg-light); color: var(--burg-light); background: rgba(122,32,48,.12); }
    .header h1 {
      font-family: 'Cinzel', serif; font-size: clamp(1.8rem,5vw,3rem);
      font-weight: 900; color: var(--bronze-light); letter-spacing: .15em;
      text-shadow: 1px 2px 8px rgba(0,0,0,.6); text-transform: uppercase;
    }
    .header h1 span { color: var(--burg-light); }
    .header-sub { font-style: italic; color: var(--ivory-dim); font-size: .95rem; margin-top: 4px; letter-spacing: .08em; }

    /* ─── BUTTONS ────────────────────────────────────────────── */
    .btn {
      font-family: 'Cinzel', serif; font-size: .82rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; padding: 11px 26px;
      border: none; cursor: pointer; transition: all .18s; border-radius: 6px;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .35; cursor: not-allowed; transform: none; filter: none; }
    .btn-primary { background: linear-gradient(135deg, #7A2030 0%, #9B3040 100%); color: var(--ivory); border: 1px solid rgba(176,141,87,.2); box-shadow: 0 4px 16px rgba(0,0,0,.4); }
    .btn-secondary { background: #161E31; color: var(--bronze-light); border: 1px solid rgba(176,141,87,.35); }
    .btn-ghost { background: rgba(232,224,212,.04); color: var(--ivory-dim); border: 1px solid rgba(232,224,212,.15); }
    .btn-liberal { background: linear-gradient(135deg, #4A7A9B 0%, #8AAEC8 100%); color: white; border: 1px solid rgba(138,174,200,.25); box-shadow: 0 4px 14px rgba(0,0,0,.35); }
    .btn-fascist { background: linear-gradient(135deg, #7A2030 0%, #9B3040 100%); color: var(--ivory); border: 1px solid rgba(176,141,87,.15); box-shadow: 0 4px 14px rgba(0,0,0,.35); }
    .btn-sm { padding: 7px 14px; font-size: .72rem; }
    .btn-lg { padding: 14px 38px; font-size: .95rem; }
    .btn-full { width: 100%; }

    /* ─── PANELS ─────────────────────────────────────────────── */
    .panel {
      background: var(--panel); border: 1px solid var(--panel-border);
      border-radius: 10px; box-shadow: 0 4px 24px rgba(0,0,0,.5); padding: 20px;
    }
    .panel-title {
      font-family: 'Cinzel', serif; font-size: .88rem; font-weight: 700;
      color: var(--bronze-light); letter-spacing: .15em; text-transform: uppercase;
      margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--panel-border);
    }

    /* ─── INPUTS ─────────────────────────────────────────────── */
    .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .input-label { font-family: 'Cinzel', serif; font-size: .67rem; letter-spacing: .15em; color: var(--bronze); text-transform: uppercase; }
    .input {
      background: #111B30; border: 1px solid rgba(176,141,87,.25);
      color: var(--ivory); font-family: 'Crimson Text', serif; font-size: 1.1rem;
      padding: 10px 14px; width: 100%; outline: none; transition: border-color .2s; border-radius: 6px;
    }
    .input:focus { border-color: var(--bronze); }
    .input::placeholder { color: var(--ivory-faint); }
    .input-code { text-transform: uppercase; letter-spacing: .2em; font-family: 'Cinzel', serif; }

    /* ─── LOBBY ──────────────────────────────────────────────── */
    .lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; padding: 24px 16px; gap: 28px; }
    .lobby-hero { text-align: center; max-width: 500px; }
    .lobby-hero p { color: var(--ivory-dim); font-style: italic; font-size: 1.1rem; line-height: 1.6; margin-top: 12px; }
    .lobby-footer { text-align: center; color: var(--ivory-faint); font-style: italic; font-size: .85rem; }

    /* home step — two big buttons */
    .lobby-home { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 360px; }
    .lobby-big-btn {
      width: 100%; padding: 18px 28px; border-radius: 10px;
      font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 700;
      letter-spacing: .15em; text-transform: uppercase; cursor: pointer; transition: all .18s;
      display: flex; align-items: center; justify-content: center; gap: 12px;
    }
    .lobby-big-btn.create {
      background: linear-gradient(135deg, #7A2030 0%, #9B3040 100%);
      color: var(--ivory); border: 1px solid rgba(176,141,87,.2);
      box-shadow: 0 6px 24px rgba(0,0,0,.4);
    }
    .lobby-big-btn.create:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,.5); }
    .lobby-big-btn.join {
      background: #141E34; color: var(--bronze-light);
      border: 1px solid rgba(176,141,87,.35);
    }
    .lobby-big-btn.join:hover { border-color: var(--bronze); background: #1A2540; }

    /* name entry step */
    .lobby-form { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 16px; }
    .lobby-form-title { font-family: 'Cinzel', serif; font-size: 1.1rem; font-weight: 700; color: var(--bronze-light); text-align: center; letter-spacing: .1em; margin-bottom: 4px; }
    .lobby-back-btn { background: none; border: none; color: var(--ivory-faint); font-size: .85rem; cursor: pointer; text-align: center; margin-top: 4px; transition: color .15s; font-family: 'Crimson Text', serif; }
    .lobby-back-btn:hover { color: var(--ivory-dim); }

    /* ─── WAITING ROOM ───────────────────────────────────────── */
    .waiting-room { max-width: 640px; margin: 40px auto; padding: 24px 16px; }
    .room-code-label { font-family: 'Cinzel', serif; font-size: .65rem; letter-spacing: .25em; color: var(--ivory-faint); text-transform: uppercase; margin-bottom: 8px; text-align: center; }
    .room-code-big { font-family: 'Cinzel', serif; font-size: 3rem; font-weight: 900; color: var(--bronze-light); letter-spacing: .35em; text-shadow: 1px 2px 10px rgba(0,0,0,.5); text-align: center; }
    .room-code-sub { text-align: center; color: var(--ivory-faint); font-style: italic; font-size: .88rem; margin: 8px 0 14px; }
    .invite-row { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 16px; }
    .invite-copy-btn {
      font-family: 'Cinzel', serif; font-size: .68rem; letter-spacing: .08em;
      text-transform: uppercase; padding: 9px 22px; border-radius: 6px;
      border: 1px solid rgba(176,141,87,.35); background: #151C2F;
      color: var(--bronze-light); cursor: pointer; transition: all .18s;
    }
    .invite-copy-btn:hover { background: rgba(176,141,87,.2); border-color: var(--bronze); }
    .invite-copy-btn.copied { color: var(--green-pass); border-color: rgba(78,154,110,.5); background: #121E1C; }
    .invite-whatsapp-btn {
      display: flex; align-items: center; gap: 9px;
      background: #25D366; color: #fff; border: none;
      font-family: 'Cinzel', serif; font-size: .78rem; font-weight: 700;
      letter-spacing: .06em; padding: 11px 26px; border-radius: 8px;
      cursor: pointer; transition: all .18s; box-shadow: 0 4px 16px rgba(37,211,102,.3);
    }
    .invite-whatsapp-btn:hover { background: #1ebe5c; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,211,102,.45); }
    .invite-whatsapp-btn svg { width: 18px; height: 18px; fill: #fff; flex-shrink: 0; }
    .player-list { display: flex; flex-direction: column; gap: 8px; margin: 12px 0; }
    .player-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 14px;
      background: #111929; border: 1px solid var(--panel-border);
      border-left: 3px solid var(--bronze); border-radius: 6px;
    }
    .player-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif; font-weight: 700; font-size: .85rem;
      background: linear-gradient(135deg, var(--navy3), var(--navy2));
      color: var(--bronze-light); border: 1px solid rgba(176,141,87,.3);
    }
    .player-name { font-size: 1.05rem; color: var(--ivory); flex: 1; }
    .player-host-badge {
      font-family: 'Cinzel', serif; font-size: .58rem; letter-spacing: .1em;
      color: var(--bronze); border: 1px solid rgba(176,141,87,.35);
      padding: 2px 8px; border-radius: 4px; background: #141B2D;
    }
    .host-actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
    .waiting-footer { text-align: center; color: var(--ivory-faint); font-style: italic; margin-top: 16px; font-size: .9rem; }
    .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--panel-border), transparent); margin: 14px 0; }

    /* ─── NIGHT PHASE ────────────────────────────────────────── */
    .night-phase { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; padding: 24px; text-align: center; gap: 24px; }
    .night-label { font-family: 'Cinzel', serif; font-size: .8rem; letter-spacing: .2em; color: rgba(232,224,212,.4); text-transform: uppercase; }
    .role-card {
      width: 220px; height: 320px; border: 2px solid; border-radius: 14px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; cursor: pointer; transition: all .3s;
    }
    .role-card.liberal { border-color: var(--steel); background: linear-gradient(160deg, rgba(107,143,173,.2), rgba(14,22,40,.95)); box-shadow: 0 8px 32px rgba(0,0,0,.5); }
    .role-card.fascist { border-color: var(--burg); background: linear-gradient(160deg, #221527, rgba(14,22,40,.95)); box-shadow: 0 8px 32px rgba(0,0,0,.5); }
    .role-card.hitler { border-color: var(--bronze); background: linear-gradient(160deg, rgba(122,32,48,.25), rgba(14,22,40,.97)); box-shadow: 0 8px 32px rgba(0,0,0,.6); }
    .role-icon { font-size: 4rem; }
    .role-name { font-family: 'Cinzel', serif; font-size: 1.4rem; font-weight: 900; letter-spacing: .16em; text-transform: uppercase; }
    .role-card.liberal .role-name { color: var(--steel-light); }
    .role-card.fascist .role-name { color: var(--burg-light); }
    .role-card.hitler .role-name { color: var(--bronze-light); }
    .role-desc { font-style: italic; color: var(--ivory-dim); font-size: .9rem; padding: 0 16px; }
    .fascist-knowledge { background: #181426; border: 1px solid rgba(122,32,48,.4); padding: 16px 24px; max-width: 400px; width: 100%; border-radius: 8px; }
    .fascist-knowledge h3 { font-family: 'Cinzel', serif; color: var(--burg-light); font-size: .82rem; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px; }
    .fascist-knowledge p { color: var(--ivory); font-size: 1rem; margin-bottom: 4px; }
    .night-hint { color: rgba(232,224,212,.4); font-style: italic; font-size: .9rem; max-width: 360px; }

    /* ─── STATUS BAR ─────────────────────────────────────────── */
    .status-bar {
      display: flex; align-items: center; gap: 16px; padding: 9px 16px;
      background: #131A2E; border-bottom: 1px solid var(--panel-border);
      flex-wrap: wrap; font-size: .85rem;
    }
    .status-item { display: flex; align-items: center; gap: 6px; color: var(--ivory-dim); }
    .status-label { font-family: 'Cinzel', serif; font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: var(--ivory-faint); }
    .status-value { font-weight: 700; color: var(--bronze-light); }
    .exit-btn {
      font-family: 'Cinzel', serif; font-size: .6rem; letter-spacing: .1em;
      text-transform: uppercase; padding: 6px 14px; border: 1px solid rgba(232,224,212,.12);
      background: transparent; color: var(--ivory-faint); cursor: pointer; transition: all .2s;
      margin-left: auto; flex-shrink: 0; border-radius: 5px;
    }
    .exit-btn:hover { border-color: var(--burg-light); color: var(--burg-light); }

    /* ─── GAMEBOARD ──────────────────────────────────────────── */
    .gameboard { max-width: 1100px; margin: 0 auto; padding: 16px; display: grid; grid-template-columns: 300px 1fr; gap: 16px; align-items: start; }
    .gameboard-left { display: flex; flex-direction: column; gap: 12px; }
    .gameboard-right { display: flex; flex-direction: column; gap: 12px; }
    @media(max-width:700px) { .gameboard { grid-template-columns: 1fr; } }

    /* ─── LEFT PANEL ─────────────────────────────────────────── */
    .left-panel { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 10px; box-shadow: 0 4px 24px rgba(0,0,0,.5); padding: 16px; }

    /* ─── TABS ───────────────────────────────────────────────── */
    .panel-tabs { display: flex; border-bottom: 1px solid var(--panel-border); margin-bottom: 14px; }
    .panel-tab {
      font-family: 'Cinzel', serif; font-size: .66rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; padding: 8px 15px; cursor: pointer; color: var(--ivory-faint);
      border-bottom: 2px solid transparent; transition: all .18s; background: none;
      border-top: none; border-left: none; border-right: none; position: relative; top: 1px;
    }
    .panel-tab:hover { color: var(--ivory-dim); }
    .panel-tab.active { color: var(--bronze-light); border-bottom-color: var(--bronze); }
    .tab-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--burg-light); margin-left: 6px; vertical-align: middle; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ─── POLICY TRACKS ──────────────────────────────────────── */
    .policy-tracks { display: flex; flex-direction: column; gap: 12px; }
    .policy-track { padding: 16px; border-radius: 8px; }
    .liberal-track { background: #131B26; border: 1px solid rgba(107,143,173,.3); }
    .fascist-track { background: #181426; border: 1px solid rgba(122,32,48,.35); }
    .track-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .track-label { font-family: 'Cinzel', serif; font-size: .7rem; letter-spacing: .15em; text-transform: uppercase; font-weight: 700; }
    .track-label.liberal { color: var(--steel-light); }
    .track-label.fascist { color: var(--burg-light); }
    .track-count { font-family: 'Cinzel', serif; font-size: 1.4rem; font-weight: 900; }
    .track-count.liberal { color: var(--steel-light); }
    .track-count.fascist { color: var(--burg-light); }
    .policy-slots { display: flex; gap: 6px; }
    .policy-slot { flex: 1; height: 44px; border: 1px solid; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: all .3s; position: relative; border-radius: 4px; }
    .liberal-slot { border-color: rgba(107,143,173,.22); background: #101828; }
    .liberal-slot.filled { background: linear-gradient(135deg, #4A7A9B 0%, #8AAEC8 100%); border-color: var(--steel); box-shadow: 0 2px 10px rgba(0,0,0,.35); }
    .fascist-slot { border-color: #221527; background: #101727; }
    .fascist-slot.filled { background: linear-gradient(135deg, #7A2030 0%, #9B3040 100%); border-color: var(--burg-light); box-shadow: 0 2px 10px rgba(0,0,0,.35); }
    .action-badge { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); font-family: 'Cinzel', serif; font-size: .44rem; letter-spacing: .05em; color: var(--ivory-faint); white-space: nowrap; text-transform: uppercase; }

    /* ─── ELECTION TRACKER ───────────────────────────────────── */
    .election-tracker { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #131A2C; border: 1px solid rgba(176,141,87,.22); border-radius: 8px; margin-top: 12px; }
    .tracker-label { font-family: 'Cinzel', serif; font-size: .66rem; letter-spacing: .1em; text-transform: uppercase; color: var(--ivory-dim); flex-shrink: 0; }
    .tracker-dots { display: flex; gap: 8px; flex: 1; }
    .tracker-dot { width: 20px; height: 20px; border-radius: 50%; border: 1px solid rgba(176,141,87,.28); background: rgba(176,141,87,.05); transition: all .3s; }
    .tracker-dot.active { background: linear-gradient(135deg,#C8860A,#E5A020); border-color: #C8860A; box-shadow: 0 2px 8px rgba(0,0,0,.4); }
    .chaos-warning { font-size: .72rem; color: var(--bronze-light); font-family: 'Cinzel', serif; letter-spacing: .05em; }

    /* ─── ACTION TAB ─────────────────────────────────────────── */
    .vote-tab-content { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 10px 0 4px; text-align: center; }
    .vote-gov-header { font-family: 'Cinzel', serif; font-size: .62rem; letter-spacing: .14em; text-transform: uppercase; color: var(--ivory-faint); margin-bottom: 2px; }
    .vote-gov-names { font-size: 1.04rem; color: var(--ivory); margin-bottom: 4px; line-height: 1.5; }
    .vote-gov-roles { font-size: .72rem; color: rgba(232,224,212,.3); font-family: 'Cinzel', serif; letter-spacing: .08em; }
    .vote-status-row { display: flex; align-items: center; gap: 8px; font-size: .82rem; color: var(--ivory-dim); font-style: italic; }
    .vote-confirm { font-family: 'Cinzel', serif; font-size: .78rem; letter-spacing: .08em; padding: 8px 18px; border: 1px solid; border-radius: 6px; }
    .vote-confirm.ja { color: var(--green-pass); border-color: rgba(78,154,110,.4); background: #121E1C; }
    .vote-confirm.nein { color: var(--burg-light); border-color: rgba(122,32,48,.5); background: rgba(122,32,48,.08); }
    .vote-buttons { display: flex; gap: 10px; flex-direction: column; width: 100%; }
    .vote-result-breakdown { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 6px; }
    .vr-chip { font-size: .76rem; padding: 3px 10px; border: 1px solid; border-radius: 5px; display: flex; align-items: center; gap: 4px; }
    .vr-chip.ja { color: var(--green-pass); border-color: rgba(78,154,110,.35); }
    .vr-chip.nein { color: var(--burg-light); border-color: rgba(122,32,48,.4); }
    .phase-title { font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 700; color: var(--bronze-light); letter-spacing: .12em; text-transform: uppercase; }
    .phase-sub { color: var(--ivory-dim); font-style: italic; font-size: .9rem; max-width: 400px; }
    .action-idle { color: rgba(232,224,212,.3); font-style: italic; font-size: .88rem; padding: 20px 0; }

    /* ─── POLICY CARDS ───────────────────────────────────────── */
    .policy-cards-area { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%; }
    .policy-card {
      width: 100%; height: 56px; border: 2px solid; border-radius: 8px;
      display: flex; align-items: center; gap: 14px; padding: 0 16px;
      cursor: pointer; transition: all .2s;
    }
    .policy-card.liberal-policy { border-color: var(--steel); color: var(--steel-light); background: linear-gradient(160deg, #172031, rgba(14,22,40,.9)); }
    .policy-card.fascist-policy { border-color: var(--burg-light); color: var(--burg-light); background: linear-gradient(160deg, #221527, rgba(14,22,40,.9)); }
    .policy-card:hover { transform: translateX(4px); box-shadow: 0 4px 18px rgba(0,0,0,.5); }
    .policy-card-icon { font-size: 1.4rem; }
    .policy-card-type { font-family: 'Cinzel', serif; font-size: .68rem; letter-spacing: .1em; text-transform: uppercase; font-weight: 700; }
    .policy-card-action { margin-left: auto; font-family: 'Cinzel', serif; font-size: .58rem; letter-spacing: .14em; text-transform: uppercase; opacity: .45; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k === 'class') { el.className = v; }
    else if (k === 'style' && typeof v === 'object') { Object.assign(el.style, v); }
    else if (k.startsWith('on')) { el.addEventListener(k.slice(2).toLowerCase(), v); }
    else if (k === 'disabled') { if(v) el.disabled = true; }
    else { el.setAttribute(k, v); }
  }
  for (const child of children.flat(Infinity)) {
    if (child == null || child === false) continue;
    el.appendChild(typeof child === 'string' || typeof child === 'number'
      ? document.createTextNode(child) : child);
  }
  return el;
}

// SOUND ENGINE — Web Audio API, 1930s historical tone
// ═══════════════════════════════════════════════════════════════
const SFX = (() => {
  let ctx = null;

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function master(vol = 0.5) {
    const g = getCtx().createGain();
    g.gain.setValueAtTime(vol, getCtx().currentTime);
    g.connect(getCtx().destination);
    return g;

    const c = getCtx();
    const t = c.currentTime;
    const g = master(vol);

    // Thud: short filtered noise burst
    const buf = c.createBuffer(1, c.sampleRate * 0.15, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 3);
    const src = c.createBufferSource();
    src.buffer = buf;
    const filter = c.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(300, t);
    src.connect(filter);
    filter.connect(g);
    src.start(t);

    osc.type = 'sine';
    osc.frequency.setValueAtTime(180, t);
    osc.frequency.exponentialRampToValueAtTime(60, t + 0.08);
    const og = c.createGain();
    og.gain.setValueAtTime(0.8, t);
    og.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    osc.connect(og); og.connect(g);
    osc.start(t); osc.stop(t + 0.12);

  // ── Paper shuffle — nomination / policy draw ─────────────────
  function paperShuffle(vol = 0.35) {
    const c = getCtx();
    const t = c.currentTime;
    const g = master(vol);
    const duration = 0.4;
    const buf = c.createBuffer(1, c.sampleRate * duration, c.sampleRate);
    const data = buf.getChannelData(0);

    for (let i = 0; i < data.length; i++) {
      const progress = i / data.length;

    og.gain.setValueAtTime(0.15, t);
    og.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    osc.connect(og); og.connect(g);
    osc.start(t); osc.stop(t + 0.04);
  }

  // ── Seal stamp — policy enacted ─────────────────────────────
  function sealStamp(type = 'fascist', vol = 0.55) {
    const c = getCtx();
    const t = c.currentTime;
    const g = master(vol);

    const freq = type === 'liberal' ? 220 : 140;
    const color = type === 'liberal' ? 600 : 200;

    // Heavy thud
    const buf = c.createBuffer(1, c.sampleRate * 0.25, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const env = Math.pow(1 - i / data.length, 2.5);
      data[i] = (Math.random() * 2 - 1) * env;
    }
    const src = c.createBufferSource();
    src.buffer = buf;
    const filter = c.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(color, t);
    src.connect(filter); filter.connect(g);
    src.start(t);

    // Resonant tone
    const osc = c.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.5, t + 0.3);
    const og = c.createGain();
    og.gain.setValueAtTime(0.6, t);
    og.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(og); og.connect(g);
    osc.start(t); osc.stop(t + 0.3);
  }

  // ── Bell chime — game start / role reveal ────────────────────
  function bellChime(vol = 0.45) {
    const c = getCtx();
    const t = c.currentTime;
    const g = master(vol);

    // Three ascending bell tones — telegraph/town hall feel
    [440, 554, 659].forEach((freq, i) => {
      const osc = c.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + i * 0.18);
      // Add slight inharmonic overtone for metal bell character
      const osc2 = c.createOscillator();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(freq * 2.756, t + i * 0.18);
      const og = c.createGain();
      og.gain.setValueAtTime(0, t + i * 0.18);
      og.gain.linearRampToValueAtTime(0.5, t + i * 0.18 + 0.01);
      og.gain.exponentialRampToValueAtTime(0.001, t + i * 0.18 + 0.8);
      const og2 = c.createGain();
      og2.gain.setValueAtTime(0, t + i * 0.18);
      og2.gain.linearRampToValueAtTime(0.15, t + i * 0.18 + 0.01);
      og2.gain.exponentialRampToValueAtTime(0.001, t + i * 0.18 + 0.5);
      osc.connect(og); og.connect(g);
      osc2.connect(og2); og2.connect(g);
      osc.start(t + i * 0.18); osc.stop(t + i * 0.18 + 0.8);
      osc2.start(t + i * 0.18); osc2.stop(t + i * 0.18 + 0.8);
    });
  }

  // ── Gunshot — execution ──────────────────────────────────────
  function gunshot(vol = 0.5) {
    const c = getCtx();
    const t = c.currentTime;
    const g = master(vol);

    // Sharp crack
    const buf = c.createBuffer(1, c.sampleRate * 0.3, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const env = i < 50
        ? i / 50
        : Math.pow(1 - (i - 50) / (data.length - 50), 1.5);
      data[i] = (Math.random() * 2 - 1) * env;
    }
    const src = c.createBufferSource();
    src.buffer = buf;
    // Two filters: crack (high) + body (low)
    const crack = c.createBiquadFilter();
    crack.type = 'highpass';
    crack.frequency.setValueAtTime(1200, t);
    const body = c.createBiquadFilter();
    body.type = 'lowpass';
    body.frequency.setValueAtTime(400, t);
    const crackGain = c.createGain(); crackGain.gain.setValueAtTime(0.6, t);
    const bodyGain = c.createGain(); bodyGain.gain.setValueAtTime(0.9, t);
    src.connect(crack); crack.connect(crackGain); crackGain.connect(g);
    src.connect(body); body.connect(bodyGain); bodyGain.connect(g);
    src.start(t);

    // Reverb tail
    const rev = c.createBuffer(1, c.sampleRate * 0.4, c.sampleRate);
    const revData = rev.getChannelData(0);
    for (let i = 0; i < revData.length; i++) revData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / revData.length, 3) * 0.15;
    const revSrc = c.createBufferSource();
    revSrc.buffer = rev;
    const revFilter = c.createBiquadFilter();
    revFilter.type = 'lowpass';
    revFilter.frequency.setValueAtTime(800, t + 0.05);
    revSrc.connect(revFilter); revFilter.connect(g);
    revSrc.start(t + 0.05);
  }

  // ── Magnifying glass click — peek ───────────────────────────
  function glassClick(vol = 0.35) {
    const c = getCtx();
    const t = c.currentTime;
    const g = master(vol);
    // Light crystalline tap
    [1200, 1800, 2400].forEach((freq, i) => {
      const osc = c.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + i * 0.06);
      const og = c.createGain();
      og.gain.setValueAtTime(0.3, t + i * 0.06);
      og.gain.exponentialRampToValueAtTime(0.001, t + i * 0.06 + 0.25);
      osc.connect(og); og.connect(g);
      osc.start(t + i * 0.06); osc.stop(t + i * 0.06 + 0.25);
    });
  }

  // ── Dramatic sting — tension / investigate ───────────────────
  function tensionSting(vol = 0.4) {
    const c = getCtx();
    const t = c.currentTime;
    const g = master(vol);
    // Low rumble rising
    const osc = c.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(55, t);
    osc.frequency.linearRampToValueAtTime(110, t + 0.5);
    const filter = c.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(200, t);
    filter.frequency.linearRampToValueAtTime(600, t + 0.5);
    const og = c.createGain();
    og.gain.setValueAtTime(0, t);
    og.gain.linearRampToValueAtTime(0.4, t + 0.1);
    og.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
    osc.connect(filter); filter.connect(og); og.connect(g);
    osc.start(t); osc.stop(t + 0.55);
  }

  // ── Public API ───────────────────────────────────────────────
  return {
    nomination:   () => { try { paperShuffle(); setTimeout(() => gavel(0.3), 220); } catch(e){} },
    voteJa:       () => { try { typewriterClick(0.45); } catch(e){} },
    voteNein:     () => { try { typewriterClick(0.3); setTimeout(() => typewriterClick(0.2), 80); } catch(e){} },
    voteResult:   (passed) => { try { passed ? gavel(0.55) : gavel(0.3); } catch(e){} },
    policyLib:    () => { try { paperShuffle(0.25); setTimeout(() => sealStamp('liberal', 0.5), 300); } catch(e){} },
    policyFas:    () => { try { paperShuffle(0.25); setTimeout(() => sealStamp('fascist', 0.6), 300); } catch(e){} },
    roleReveal:   () => { try { bellChime(); } catch(e){} },
    gameStart:    () => { try { bellChime(0.5); setTimeout(() => gavel(0.4), 600); } catch(e){} },
    kill:         () => { try { gunshot(); } catch(e){} },
    peek:         () => { try { glassClick(); } catch(e){} },
    investigate:  () => { try { tensionSting(); } catch(e){} },
    specialElect: () => { try { gavel(0.5); setTimeout(() => bellChime(0.3), 300); } catch(e){} },
  };
})();

function notify(msg, duration=3500) {
  const existing = document.querySelector('.notification');
  if (existing) existing.remove();
  const el = h('div', {class:'notification'}, msg);
  document.body.appendChild(el);
  clearTimeout(APP._notifTimer);
  APP._notifTimer = setTimeout(() => el.remove(), duration);
}

// ═══════════════════════════════════════════════════════════════
// SUPABASE HELPERS
// ═══════════════════════════════════════════════════════════════
async function pushRoomState(patch) {
  const { error } = await db.from('rooms').update(patch).eq('code', APP.roomCode);
  if (error) console.error('pushState error', error);
}

async function deleteRoom() {
  if (!APP.roomCode) return;
  await db.from('rooms').delete().eq('code', APP.roomCode);
}

function subscribeToRoom(code) {
  if (APP._channel) { db.removeChannel(APP._channel); APP._channel = null; }
  APP._channel = db.channel('room:'+code, { config: { presence: { key: APP.myId } } })
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'rooms', filter:`code=eq.${code}` },
      payload => { onRoomUpdate(payload.new); })
    .on('presence', { event: 'sync' }, () => {
      const state = APP._channel.presenceState();
      APP._presenceMap = {};
      Object.keys(state).forEach(key => { APP._presenceMap[key] = true; });
      render();
    })
    .on('presence', { event: 'join' }, ({ key }) => {
      APP._presenceMap[key] = true;
      render();
    })
    .on('presence', { event: 'leave' }, ({ key }) => {
      delete APP._presenceMap[key];
      render();
    })
    .subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        await APP._channel.track({ id: APP.myId, name: APP.myName, online: true });
      }
    });
}

function onRoomUpdate(row) {
  const prevPhase = APP.gameState?.phase;

  APP.players   = row.players   || [];
  APP.roles     = row.roles     || {};
  APP.gameState = row.game_state|| null;

  // Derive fascist knowledge for THIS player whenever roles arrive.
  // Fascists always see all other fascists + Hitler.
  // Hitler sees fascists only in 5-6 player games.
  // Liberals see nobody.
  if (Object.keys(APP.roles).length > 0) {
    const myRole = APP.roles[APP.myId];
    if (myRole === 'fascist') {
      APP.fascistKnowledge = Object.entries(APP.roles)
        .filter(([id, r]) => (r === 'fascist' || r === 'hitler') && id !== APP.myId)
        .map(([id, r]) => ({ id, role:r, name: APP.players.find(p=>p.id===id)?.name||'?' }));
    } else if (myRole === 'hitler' && APP.players.length <= 6) {
      APP.fascistKnowledge = Object.entries(APP.roles)
        .filter(([id, r]) => r === 'fascist')
        .map(([id, r]) => ({ id, role:'fascist', name: APP.players.find(p=>p.id===id)?.name||'?' }));
    } else {
      APP.fascistKnowledge = [];
    }
  }

  // Sync screen from Supabase — drives all non-host transitions
  if (row.screen && row.screen !== APP.screen) {
    APP.screen = row.screen;
    // Reset night reveal for everyone when entering night phase
    if (row.screen === 'night') {
      APP.nightRevealed = false;
      APP.roleVisible = false;
    }
  }

  // Auto-switch tabs based on phase and player role
  if (APP.gameState) {
    const p = APP.gameState.phase;
    const gs = APP.gameState;
    const amPres  = gs.president_id  === APP.myId;
    const amChanc = gs.chancellor_id === APP.myId;

    if (p === 'vote' || p === 'vote_result') {
      // Everyone goes to Action to vote / see result
      APP.leftTab = 'action';
    } else if (p === 'president_discard') {
      // President goes to Action to pick; everyone else sees the policy board
      if (p !== prevPhase) APP.leftTab = amPres ? 'action' : 'board';
    } else if (p === 'chancellor_discard') {
      // Chancellor goes to Action to pick; everyone else sees the policy board
      if (p !== prevPhase) APP.leftTab = amChanc ? 'action' : 'board';
    } else if (prevPhase && prevPhase !== p && p === 'nomination') {
      APP.leftTab = 'board';
    }
  }

  // Check win — any client detects and shows win screen
  if (APP.gameState && !APP.winState) {
    const win = checkWin(APP.gameState);
    if (win) {
      APP.winState = win;
      APP.screen = 'win';
    }
  }

  // Host resolves vote when all players have voted
  if (APP.isHost && APP.gameState && APP.screen === 'game') {
    checkVoteTally();
  }

  render();
}

// LOBBY ACTIONS
// ═══════════════════════════════════════════════════════════════
async function createRoom() {
  if (!APP.myName.trim()) { notify('Enter your name first'); return; }
  sessionStorage.setItem('sh_myName', APP.myName.trim());
  const code = generateCode();
  const me = { id:APP.myId, name:APP.myName.trim(), alive:true };
  APP.screen = 'loading';
  render();
  const { error } = await db.from('rooms').insert({
    code,
    host_id: APP.myId,
    players: [me],
    roles: {},
    game_state: {
      phase:'waiting', round:1, president_id:null, chancellor_id:null,
      liberal_policies:0, fascist_policies:0, election_tracker:0,
      draw_pile:[], discard_pile:[], president_cards:[], chancellor_cards:[],
      votes:{}, nominated_chancellor:null, last_president_id:null, last_chancellor_id:null,
      executive_action:null, veto_requested:false, peek_result:null,
      investigate_result:null, hitler_killed:false, hitler_elected:false, log:[],
      night_ready:[],
    },
    screen: 'waiting',
  });
  if (error) { APP.screen='lobby'; notify('Failed to create room: '+error.message); render(); return; }
  APP.roomCode = code;
  APP.hostId = APP.myId;
  APP.isHost = true;
  APP.players = [me];
  APP.screen = 'waiting';
  sessionStorage.setItem('sh_room', code);
  sessionStorage.setItem('sh_hostId', APP.myId);
  subscribeToRoom(code);
  render();
}

async function joinRoom() {
  if (!APP.myName.trim()) { notify('Enter your name first'); return; }
  sessionStorage.setItem('sh_myName', APP.myName.trim());
  const code = APP.joinCodeInput.trim().toUpperCase();
  if (!code) { notify('Enter a room code'); return; }
  APP.screen = 'loading';
  render();

  const { data, error } = await db.from('rooms').select().eq('code', code).single();
  if (error || !data) { APP.screen='lobby'; notify('Room not found — check the code'); render(); return; }

  const alreadyIn = data.players.find(p => p.id === APP.myId);
  const gameStarted = data.screen === 'game' || data.screen === 'night' || data.screen === 'win';

  if (gameStarted && !alreadyIn) {
    // Game is in progress and this person was never a player — block entry
    APP.screen='lobby';
    notify('That game has already started — you cannot join as a new player.');
    render();
    return;
  }

  if (!alreadyIn) {
    // New player joining before game starts
    const me = { id:APP.myId, name:APP.myName.trim(), alive:true };
    const updated = [...data.players, me];
    await db.from('rooms').update({ players: updated }).eq('code', code);
    const { data: fresh } = await db.from('rooms').select().eq('code', code).single();
    if (fresh) Object.assign(data, fresh);
  }
  // If alreadyIn + game started = silent rejoin — restore role visibility
  if (alreadyIn && gameStarted) {
    APP.roleVisible = true;
    APP.nightRevealed = true;
  }

  APP.roomCode = code;
  APP.hostId = data.host_id;
  APP.isHost = data.host_id === APP.myId;
  APP.players = data.players || [];
  APP.roles = data.roles || {};
  APP.gameState = data.game_state;
  APP.screen = data.screen || 'waiting';
  sessionStorage.setItem('sh_room', code);
  sessionStorage.setItem('sh_hostId', data.host_id);
  subscribeToRoom(code);
  render();
}

async function removePlayer(id) {
  const updated = APP.players.filter(p=>p.id!==id);
  APP.players = updated;
  await pushRoomState({ players: updated });
  render();
}

// GAME START
// ═══════════════════════════════════════════════════════════════
async function startGame() {
  if (APP.players.length < 5) { notify('Need at least 5 players'); return; }

  const assignedRoles = assignRoles(APP.players.map(p=>p.id));
  const deck = shuffle(INITIAL_DECK);

  const gs = {
    phase: 'nomination', round: 1,
    president_id: APP.players[0].id,
    chancellor_id: null, nominated_chancellor: null,
    liberal_policies: 0, fascist_policies: 0,
    election_tracker: 0,
    draw_pile: deck, discard_pile: [],
    president_cards: [], chancellor_cards: [],
    votes: {}, last_president_id: null, last_chancellor_id: null,
    executive_action: null, veto_requested: false,
    peek_result: null, investigate_result: null,
    hitler_killed: false, hitler_elected: false,
    log: [{ round:1, text:`Game started with ${APP.players.length} players.` }],
    night_ready: [],
  };

  APP.roles = assignedRoles;
  APP.gameState = gs;
  APP.screen = 'night';
  APP.nightRevealed = false;

  // Derive fascist knowledge for host (same logic as onRoomUpdate)
  const myRole = assignedRoles[APP.myId];
  if (myRole === 'fascist') {
    APP.fascistKnowledge = Object.entries(assignedRoles)
      .filter(([id, r]) => (r === 'fascist' || r === 'hitler') && id !== APP.myId)
      .map(([id, r]) => ({ id, role:r, name:APP.players.find(p=>p.id===id)?.name||'?' }));
  } else if (myRole === 'hitler' && APP.players.length <= 6) {
    APP.fascistKnowledge = Object.entries(assignedRoles)
      .filter(([id, r]) => r === 'fascist')
      .map(([id, r]) => ({ id, role:'fascist', name:APP.players.find(p=>p.id===id)?.name||'?' }));
  } else {
    APP.fascistKnowledge = [];
  }

  await pushRoomState({ roles: assignedRoles, game_state: gs, screen: 'night' });
  render();
}

// ═══════════════════════════════════════════════════════════════
// GAME ACTIONS — all go through pushRoomState
// ═══════════════════════════════════════════════════════════════
function addLog(gs, text) {
  return { ...gs, log: [...(gs.log||[]), { round:gs.round, text }] };
}

async function nominateChancellor(playerId) {
  const gs = APP.gameState;
  if (gs.president_id !== APP.myId) return;
  const nominee = APP.players.find(p=>p.id===playerId);
  const president = APP.players.find(p=>p.id===gs.president_id);
  let newGs = addLog(gs, `${president?.name} nominated ${nominee?.name} as Chancellor.`);
  newGs = { ...newGs, nominated_chancellor: playerId, phase: 'vote' };
  SFX.nomination();
  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  render();
}

async function castVote(vote) {
  const gs = APP.gameState;
  if (gs.votes[APP.myId] !== undefined) return;

  // Each player submits their own vote
  const newVotes = { ...gs.votes, [APP.myId]: vote };
  let newGs = { ...gs, votes: newVotes };

  // Check if all alive players have now voted — any client can detect this
  // but only the host resolves it to avoid race conditions
  const alive = APP.players.filter(p => p.alive);
  const allVoted = alive.every(p => newVotes[p.id] !== undefined);

  if (allVoted && APP.isHost) {
    const jas  = alive.filter(p => newVotes[p.id] === 'ja').length;
    const neins = alive.filter(p => newVotes[p.id] === 'nein').length;
    newGs = await resolveVote(newGs, newVotes, jas > neins);
  }

  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  render();
}

// Host watches incoming vote updates and resolves when all players have voted
async function checkVoteTally() {
  const gs = APP.gameState;
  if (!APP.isHost || gs?.phase !== 'vote') return;
  const alive = APP.players.filter(p => p.alive);
  const allVoted = alive.every(p => gs.votes?.[p.id] !== undefined);
  if (!allVoted) return;
  // Already resolved if phase changed — guard against double-resolve
  if (gs.phase !== 'vote') return;
  const jas  = alive.filter(p => gs.votes[p.id] === 'ja').length;
  const neins = alive.filter(p => gs.votes[p.id] === 'nein').length;
  let newGs = await resolveVote({ ...gs }, gs.votes, jas > neins);
  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  render();
}

async function resolveVote(gs, votes, passed) {
  const nominated = APP.players.find(p=>p.id===gs.nominated_chancellor);
  const president = APP.players.find(p=>p.id===gs.president_id);

  if (passed) {
    const nomRole = APP.roles[gs.nominated_chancellor];
    if (nomRole === 'hitler' && gs.fascist_policies >= 3) {
      let newGs = addLog(gs, `${nominated?.name} elected — Hitler is in power!`);
      newGs = { ...newGs, phase:'vote_result', chancellor_id:gs.nominated_chancellor, hitler_elected:true, votes };
      setTimeout(async () => { APP.winState={winner:'fascist',reason:'Hitler was elected Chancellor!'}; APP.screen='win'; await deleteRoom(); render(); }, 1800);
      return newGs;
    }
    SFX.voteResult(true);
    let newGs = addLog(gs, `Vote passed. ${president?.name} & ${nominated?.name} form the government.`);
    newGs = { ...newGs, phase:'vote_result', chancellor_id:gs.nominated_chancellor, election_tracker:0, votes,
      current_pres_name: president?.name || 'President',
      current_chanc_name: nominated?.name || 'Chancellor',
    };
    setTimeout(async () => {
      await beginLegislation();
    }, 2200);
    return newGs;
  } else {
    const newTracker = gs.election_tracker + 1;
    SFX.voteResult(false);
    let newGs = addLog(gs, `Vote failed. ${president?.name} & ${nominated?.name} rejected. Election tracker: ${newTracker}.`);
    if (newTracker >= 3) {
      newGs = addLog(newGs, 'Country in chaos! Top policy auto-enacted.');
      newGs = { ...newGs, votes, phase:'vote_result' };
      setTimeout(async () => {
        const cur = APP.gameState;
        const deck = cur.draw_pile.length > 0 ? cur.draw_pile : shuffle(INITIAL_DECK);
        const [top, ...rest] = deck;
        const chaosPres = APP.players.find(p=>p.id===cur.president_id)?.name || 'President';
        await enactPolicy(top, rest, cur.discard_pile, true, 0, chaosPres, '(chaos — no chancellor)');
      }, 2200);
      return newGs;
    }
    const nextPres = nextPresId(gs.president_id, APP.players);
    newGs = { ...newGs, phase:'vote_result', election_tracker:newTracker, votes };
    setTimeout(async () => {
      const cur = APP.gameState;
      // Guard: only advance if still in vote_result (not already moved on)
      if (cur.phase !== 'vote_result') return;
      let next = { ...cur, phase:'nomination', round:cur.round+1, president_id:nextPres, nominated_chancellor:null, votes:{}, chancellor_id:null };
      APP.gameState = next;
      await pushRoomState({ game_state: next });
      render();
    }, 2200);
    return newGs;
  }
}

async function beginLegislation() {
  const gs = APP.gameState;
  let deck = [...gs.draw_pile];
  let discard = [...gs.discard_pile];
  if (deck.length < 3) { deck = shuffle([...deck, ...discard]); discard = []; }
  const drawn = deck.splice(0,3);
  const newGs = { ...gs, phase:'president_discard', draw_pile:deck, discard_pile:discard, president_cards:drawn, chancellor_cards:[] };
  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  render();
}

async function presidentDiscard(idx) {
  if (APP._discarding) return;
  const gs = APP.gameState;
  if (gs.president_id !== APP.myId) return;
  if (gs.phase !== 'president_discard') return;
  APP._discarding = true;
  const cards = [...gs.president_cards];
  const [discarded] = cards.splice(idx, 1);
  const presName = gs.current_pres_name || APP.players.find(p=>p.id===gs.president_id)?.name || 'President';
  let newGs = addLog(gs, `${presName} (President) discarded a policy.`);
  newGs = { ...newGs, phase:'chancellor_discard', president_cards:[], chancellor_cards:cards, discard_pile:[...gs.discard_pile, discarded] };
  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  APP._discarding = false;
  render();
}

async function chancellorDiscard(idx) {
  if (APP._discarding) return;
  const gs = APP.gameState;
  if (gs.chancellor_id !== APP.myId) return;
  if (gs.phase !== 'chancellor_discard') return;
  APP._discarding = true;
  const cards = [...gs.chancellor_cards];
  const [discarded] = cards.splice(idx, 1);
  const enacted = cards[0];
  const presName  = gs.current_pres_name  || APP.players.find(p=>p.id===gs.president_id)?.name  || 'President';
  const chancName = gs.current_chanc_name || APP.players.find(p=>p.id===gs.chancellor_id)?.name || 'Chancellor';
  let newGs = addLog(gs, `${chancName} (Chancellor) discarded a policy.`);
  APP.gameState = newGs;
  await enactPolicy(enacted, gs.draw_pile, [...gs.discard_pile, discarded], false, gs.election_tracker, presName, chancName);
  APP._discarding = false;
}


async function enactPolicy(policy, deck, discard, chaos, tracker, presName, chancName) {
  const gs = APP.gameState;
  const newLib = policy==='liberal' ? gs.liberal_policies+1 : gs.liberal_policies;
  const newFas = policy==='fascist' ? gs.fascist_policies+1 : gs.fascist_policies;
  // Use passed-in names, then gs snapshot, then live lookup — in priority order
  const enactPres  = presName  || gs.current_pres_name  || APP.players.find(p=>p.id===gs.president_id)?.name  || 'President';
  const enactChanc = chancName || gs.current_chanc_name || APP.players.find(p=>p.id===gs.chancellor_id)?.name || 'Chancellor';
  if (policy === 'liberal') SFX.policyLib(); else SFX.policyFas();
  let newGs = addLog(gs, `📜 ${policy.toUpperCase()} policy enacted! (${enactPres} & ${enactChanc})`);
  const win = checkWin({ ...gs, liberal_policies:newLib, fascist_policies:newFas });
  let execAction = (!chaos && policy==='fascist') ? getExecAction(newFas, APP.players.length) : null;
  const nextPres = nextPresId(gs.president_id, APP.players);
  newGs = {
    ...newGs,
    liberal_policies: newLib, fascist_policies: newFas,
    draw_pile: deck, discard_pile: discard,
    phase: win ? 'win' : execAction ? 'executive' : 'nomination',
    executive_action: execAction,
    round: newGs.round + 1,
    president_id: execAction ? gs.president_id : nextPres,
    chancellor_id: execAction ? gs.chancellor_id : null,
    last_president_id: gs.president_id, last_chancellor_id: gs.chancellor_id,
    nominated_chancellor: null, president_cards:[], chancellor_cards:[],
    votes:{}, election_tracker: chaos ? 0 : tracker,
    peek_result:null, investigate_result:null, veto_requested:false,
  };
  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  if (win) { setTimeout(async ()=>{ APP.winState=win; APP.screen='win'; await deleteRoom(); render(); }, 500); }
  render();
}

async function executePeek() {
  const gs = APP.gameState;
  if (gs.president_id !== APP.myId) return;
  SFX.peek();
  let deck = [...gs.draw_pile];
  if (deck.length < 3) deck = shuffle([...deck, ...gs.discard_pile]);
  const peeked = deck.slice(0,3);
  const peekPres = APP.players.find(p=>p.id===gs.president_id)?.name||'President';
  let newGs = addLog(gs, `${peekPres} (President) peeked at the top 3 policy cards.`);
  newGs = { ...newGs, peek_result: peeked };
  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  render();
}

async function executeInvestigate(targetId) {
  const gs = APP.gameState;
  if (gs.president_id !== APP.myId) return;
  SFX.investigate();
  const target = APP.players.find(p=>p.id===targetId);
  const party = APP.roles[targetId]==='liberal' ? 'liberal' : 'fascist';
  const invPres = APP.players.find(p=>p.id===gs.president_id)?.name||'President';
  let newGs = addLog(gs, `${invPres} (President) investigated ${target?.name}'s party.`);
  newGs = { ...newGs, investigate_result: { name:target?.name, party } };
  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  render();
}

async function executeSpecialElect(targetId) {
  const gs = APP.gameState;
  if (gs.president_id !== APP.myId) return;
  SFX.specialElect();
  const target = APP.players.find(p=>p.id===targetId);
  const specPres = APP.players.find(p=>p.id===gs.president_id)?.name||'President';
  let newGs = addLog(gs, `${specPres} (President) called a special election: ${target?.name} is the next President.`);
  newGs = { ...newGs, phase:'nomination', president_id:targetId, executive_action:null, nominated_chancellor:null, chancellor_id:null };
  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  render();
}

async function executeKill(targetId) {
  const gs = APP.gameState;
  if (gs.president_id !== APP.myId) return;
  SFX.kill();
  const target = APP.players.find(p=>p.id===targetId);
  const killPres = APP.players.find(p=>p.id===gs.president_id)?.name||'President';
  let newGs = addLog(gs, `${killPres} (President) executed ${target?.name}.`);
  const hitlerKilled = APP.roles[targetId]==='hitler';
  const newPlayers = APP.players.map(p => p.id===targetId ? {...p,alive:false} : p);
  APP.players = newPlayers;
  if (hitlerKilled) {
    newGs = addLog(newGs, `${target?.name} was Hitler! Liberals win!`);
    newGs = { ...newGs, hitler_killed:true, phase:'win' };
    APP.gameState = newGs;
    await pushRoomState({ players:newPlayers, game_state:newGs });
    setTimeout(async ()=>{ APP.winState={winner:'liberal',reason:'Hitler was assassinated!'}; APP.screen='win'; await deleteRoom(); render(); }, 500);
    render();
    return;
  }
  const nextPres = nextPresId(gs.president_id, newPlayers);
  newGs = { ...newGs, phase:'nomination', executive_action:null, president_id:nextPres, chancellor_id:null, nominated_chancellor:null };
  APP.gameState = newGs;
  await pushRoomState({ players:newPlayers, game_state:newGs });
  render();
}

async function doneWithExecutive() {
  const gs = APP.gameState;
  if (gs.president_id !== APP.myId) return;
  const nextPres = nextPresId(gs.president_id, APP.players);
  const newGs = { ...gs, phase:'nomination', executive_action:null, president_id:nextPres, chancellor_id:null, nominated_chancellor:null, peek_result:null, investigate_result:null };
  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  render();
}

async function requestVeto() {
  const gs = APP.gameState;
  if (gs.chancellor_id !== APP.myId) return;
  const vetoChancName = APP.players.find(p=>p.id===gs.chancellor_id)?.name||'Chancellor';
  let newGs = addLog(gs, `${vetoChancName} (Chancellor) requested a veto.`);
  newGs = { ...newGs, veto_requested:true };
  APP.gameState = newGs;
  await pushRoomState({ game_state: newGs });
  render();
}

async function respondVeto(accept) {
  const gs = APP.gameState;
  if (gs.president_id !== APP.myId) return;
  if (accept) {
    const newTracker = gs.election_tracker+1;
    const vetoPres = APP.players.find(p=>p.id===gs.president_id)?.name||'President';
    let newGs = addLog(gs, `${vetoPres} (President) accepted the veto. Both policies discarded.`);
    const newDiscard = [...gs.discard_pile, ...gs.chancellor_cards];
    if (newTracker >= 3) {
      newGs = addLog(newGs, 'Country in chaos! Top policy auto-enacted.');
      const deck = gs.draw_pile.length>0 ? gs.draw_pile : shuffle(INITIAL_DECK);
      const [top,...rest] = deck;
      const vetoChaosP = APP.players.find(p=>p.id===gs.president_id)?.name || 'President';
      APP.gameState = newGs;
      await enactPolicy(top, rest, newDiscard, true, 0, vetoChaosP, 'chaos');
    } else {
      const nextPres = nextPresId(gs.president_id, APP.players);
      newGs = { ...newGs, election_tracker:newTracker, discard_pile:newDiscard, chancellor_cards:[], phase:'nomination', round:newGs.round+1, president_id:nextPres, chancellor_id:null, nominated_chancellor:null, votes:{}, veto_requested:false };
      APP.gameState = newGs;
      await pushRoomState({ game_state:newGs });
      render();
    }
  } else {
    const rejectPres = APP.players.find(p=>p.id===gs.president_id)?.name||'President';
    let newGs = addLog(gs, `${rejectPres} (President) rejected the veto. Chancellor must enact a policy.`);
    newGs = { ...newGs, veto_requested:false };
    APP.gameState = newGs;
    await pushRoomState({ game_state: newGs });
    render();
  }
}

async function resetGame() {
  APP.winState = null;
  APP.roles = {};
  APP.fascistKnowledge = [];
  APP.screen = 'waiting';
  const gs = {
    phase:'waiting', round:1, president_id:null, chancellor_id:null,
    liberal_policies:0, fascist_policies:0, election_tracker:0,
    draw_pile:[], discard_pile:[], president_cards:[], chancellor_cards:[],
    votes:{}, nominated_chancellor:null, last_president_id:null, last_chancellor_id:null,
    executive_action:null, veto_requested:false, peek_result:null,
    investigate_result:null, hitler_killed:false, hitler_elected:false, log:[],
    night_ready:[],
  };
  APP.gameState = gs;
  await pushRoomState({ roles:{}, game_state:gs, screen:'waiting' });

}

function leaveRoom() {
  if (APP._channel) { db.removeChannel(APP._channel); APP._channel=null; }
  sessionStorage.removeItem('sh_room');
  sessionStorage.removeItem('sh_hostId');
  APP.screen='lobby'; APP.roomCode=null; APP.hostId=null; APP.isHost=false;
  APP.players=[]; APP.roles={}; APP.gameState=null; APP.winState=null;
  APP.fascistKnowledge=[]; APP.nightRevealed=false; APP.roleVisible=false;
  APP.lobbyStep='home'; APP.exitConfirm=false;
  render();
}

function buildApp() {
  const wrap = h('div', {class:'app'});

  if (APP.screen === 'loading') {
    wrap.appendChild(buildHeader());
    wrap.appendChild(h('div',{class:'loading-screen'},
      h('div',{class:'loading-spinner'}),
      h('p',{class:'text-dim italic'},'Connecting…')
    ));
    return wrap;
  }

  if (APP.screen === 'lobby')   { wrap.appendChild(buildHeader()); wrap.appendChild(buildLobby()); return wrap; }

  // All non-lobby screens get the connection bar
  const connBar = buildConnectionBar();

  if (APP.screen === 'waiting') {
    wrap.appendChild(buildHeader()); wrap.appendChild(buildWaiting());
    if (connBar) wrap.appendChild(connBar);
    if (APP.exitConfirm) wrap.appendChild(buildExitModal());
    return wrap;
  }
  if (APP.screen === 'night') {
    wrap.appendChild(buildHeader()); wrap.appendChild(buildNight());
    if (connBar) wrap.appendChild(connBar);
    if (APP.exitConfirm) wrap.appendChild(buildExitModal());
    return wrap;
  }
  if (APP.screen === 'win') {
    wrap.appendChild(buildWin());
    if (connBar) wrap.appendChild(connBar);
    if (APP.exitConfirm) wrap.appendChild(buildExitModal());
    return wrap;
  }

  // game screen
  wrap.appendChild(buildHeader());
  wrap.appendChild(buildStatusBar());
  wrap.appendChild(buildGameboard());
  if (APP.confirmNominee) wrap.appendChild(buildNomineeConfirmModal());
  if (connBar) wrap.appendChild(connBar);
  if (APP.exitConfirm) wrap.appendChild(buildExitModal());
  return wrap;
}

function buildConnectionBar() {
  if (!APP.roomCode || APP.screen === 'lobby' || APP.screen === 'loading') return null;

  const playerDots = APP.players.map(p => {
    const online = !!APP._presenceMap[p.id];
    return h('div', {class:'conn-player'},
      h('div', {class:`conn-dot ${online ? 'online' : 'offline'}`}),
      h('span', {}, p.name + (p.id === APP.myId ? ' ✦' : ''))
    );
  });

  return h('div', {class:'conn-bar'},
    h('span', {class:'conn-bar-label'}, 'Online'),
    h('div', {class:'conn-players'}, ...playerDots),
    APP.isHost
      ? h('span', {class:'conn-room-code'}, `Room: ${APP.roomCode}`)
      : null
  );
}

// ─── NIGHT PHASE ──────────────────────────────────────────────
function buildNight() {
  const myRole = APP.roles[APP.myId];
  const fascistKnowledge = APP.fascistKnowledge;
  const otherFascists = fascistKnowledge.filter(f=>f.id!==APP.myId&&f.role==='fascist');
  const hitlerInfo = fascistKnowledge.find(f=>f.role==='hitler');
  const hitlerKnowsFascists = APP.players.length<=6;

  const allies = [];
  if (myRole==='fascist') {
    otherFascists.forEach(f => allies.push(h('p',{},'🔴 ',f.name,' ',h('span',{class:'text-burg',style:{fontSize:'.8rem'}},'(Fascist)'))));
    if (hitlerInfo) allies.push(h('p',{style:{marginTop:'6px'}},'☠ ',hitlerInfo.name,' ',h('span',{class:'text-bronze',style:{fontSize:'.8rem'}},'(Hitler)')));
  }
  if (myRole==='hitler'&&hitlerKnowsFascists) {
    otherFascists.forEach(f => allies.push(h('p',{},'🔴 ',f.name)));
  }

  const knowledgeBox = allies.length>0 ? h('div',{class:'fascist-knowledge'},
    h('h3',{},myRole==='hitler'?'⚡ Fascist Allies (5-6p)':'⚡ Your Allies'),
    ...allies
  ) : null;

  const hint = myRole==='liberal'
    ? h('p',{class:'night-hint'},"You don't know who is who. Trust your instincts and watch the policies.")
    : null;

  const nightReady = APP.gameState?.night_ready || [];
  const allReady = APP.players.length > 0 && APP.players.every(p => nightReady.includes(p.id));
  const readyCount = nightReady.length;
  const totalCount = APP.players.length;

  let btn;
  if (!APP.nightRevealed) {
    btn = h('button', {class:'btn btn-primary btn-lg', onClick: async () => {
      SFX.roleReveal();
      APP.nightRevealed = true;
      APP.roleVisible = true;
      const gs = APP.gameState;
      const already = gs?.night_ready || [];
      if (!already.includes(APP.myId)) {
        const updated = { ...gs, night_ready: [...already, APP.myId] };
        APP.gameState = updated;
        await pushRoomState({ game_state: updated });
      }
      render();
    }}, "I've memorized my role");
  } else if (APP.isHost) {
    btn = h('div', {style:{textAlign:'center', display:'flex', flexDirection:'column', alignItems:'center', gap:'10px'}},
      h('p', {class:'text-dim italic', style:{fontSize:'.88rem'}},
        allReady ? 'All players are ready!' : `Waiting for players… (${readyCount}/${totalCount} ready)`
      ),
      h('button', {
        class: 'btn btn-primary btn-lg',
        disabled: !allReady,
        onClick: async () => {
          SFX.gameStart();
          APP.roleVisible = true;
          APP.screen = 'game';
          await pushRoomState({ screen: 'game' });
          render();
        }
      }, 'Begin the Game →')
    );
  } else {
    btn = h('div', {style:{textAlign:'center'}},
      h('p', {class:'text-dim italic', style:{marginTop:'8px'}},
        allReady ? '✓ All players ready! Waiting for host to begin…' : `Waiting for others… (${readyCount}/${totalCount} ready)`
      ),
      h('p', {class:'text-faint italic', style:{fontSize:'.8rem', marginTop:'6px'}},
        "Your role is saved — you'll see it in the 🎭 My ID tab once the game starts."
      )
    );
  }

  return h('div',{class:'night-phase'},
    h('div',{class:'night-label'},'Your Role'),
    h('div',{class:`role-card ${myRole}`},
      h('div',{class:'role-icon'},myRole==='liberal'?'🏛':myRole==='fascist'?'⚡':'☠'),
      h('div',{class:'role-name'},myRole),
      h('div',{class:'role-desc'},
        myRole==='liberal'?'Enact 5 Liberal policies or find and eliminate Hitler to win.':
        myRole==='fascist'?'Help Hitler rise. Enact Fascist policies or elect Hitler as Chancellor.':
        'Conceal your identity. Let your Fascist allies pave the way to power.'
      )
    ),
    knowledgeBox,
    hint,
    btn
  );
}

// ─── STATUS BAR ───────────────────────────────────────────────
function buildStatusBar() {
  const gs = APP.gameState;
  const pres = APP.players.find(p=>p.id===gs?.president_id);
  const chanc = APP.players.find(p=>p.id===gs?.chancellor_id);
  return h('div',{class:'status-bar'},
    h('div',{class:'status-item'},h('span',{class:'status-label'},'Round'),h('span',{class:'status-value'},gs?.round||1)),
    h('div',{class:'status-item'},h('span',{class:'status-label'},'Phase'),h('span',{class:'status-value',style:{textTransform:'capitalize'}},(gs?.phase||'').replace(/_/g,' '))),
    h('div',{class:'status-item'},h('span',{class:'status-label'},'President'),h('span',{class:'status-value'},pres?.name||'—')),
    chanc ? h('div',{class:'status-item'},h('span',{class:'status-label'},'Chancellor'),h('span',{class:'status-value'},chanc.name)) : null,
